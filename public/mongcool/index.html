<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>브랜픽 중국소싱관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface-2:#faf9f5;--border:#e8e6df;--border-strong:#d6d3ca;
  --text:#1a1917;--text2:#6b6860;--text3:#a09e99;
  --accent:#1a6b4a;--accent-bg:#e8f3ed;--accent-border:#b8dcc8;
  --warn:#8a5e00;--warn-bg:#fdf6e3;--warn-border:#e8d8a0;
  --danger:#8b2020;--danger-bg:#f9e8e8;--danger-border:#e0bbbb;
  --info:#1a4a8b;--info-bg:#e8eef9;--info-border:#bbcae0;
  --radius:8px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --sans:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
input[type="number"]{font-family:var(--mono);text-align:right}
input[type="date"]{font-family:var(--mono)}
table{width:100%;border-collapse:collapse}
.mono{font-family:var(--mono)}
.muted{color:var(--text2)}
.muted2{color:var(--text3)}
.right{text-align:right}.center{text-align:center}
.flex{display:flex;gap:8px;align-items:center}.flex-1{flex:1}
.col{display:flex;flex-direction:column;gap:8px}
.gap-4{gap:16px}.gap-6{gap:24px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.hidden{display:none!important}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid transparent}
.pill-accent{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.pill-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.pill-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.pill-info{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.pill-muted{background:var(--surface-2);color:var(--text2);border-color:var(--border)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);transition:all .15s ease;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#155539;border-color:#155539}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{padding:6px 8px;font-size:12px}

/* layout */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:8px;padding:6px 4px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.brand-icon{width:30px;height:30px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.brand-name{font-weight:700;font-size:14px;letter-spacing:-.02em}
.brand-sub{font-size:11px;color:var(--text2);font-family:var(--mono)}

.filter-block{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.filter-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.filter-block select{padding:6px 8px;font-size:13px}

.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s ease}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.nav-icon{width:18px;text-align:center;font-size:14px}

.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:600;letter-spacing:-.02em}
.topbar-actions{display:flex;gap:8px}
.view{flex:1;overflow-y:auto;padding:24px}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card+.card{margin-top:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;letter-spacing:-.01em}

.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl{font-size:13px}
.tbl th{background:var(--surface-2);text-align:left;padding:10px 12px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--text)}
.tbl th.sort-asc::after{content:' ▲';font-size:9px;color:var(--accent)}
.tbl th.sort-desc::after{content:' ▼';font-size:9px;color:var(--accent)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:background .12s}
.tbl tr.clickable:hover{background:var(--surface-2)}
.tbl input,.tbl select{padding:4px 6px;font-size:12px;border-color:transparent;background:transparent}
.tbl input:hover,.tbl select:hover{border-color:var(--border-strong)}
.tbl input:focus,.tbl select:focus{background:var(--surface)}

/* search/toolbar */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search{position:relative;flex:1;min-width:200px;max-width:400px}
.search input{padding-left:32px}
.search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}

/* stats bar */
.stats-bar{display:flex;gap:16px;padding:12px 16px;background:var(--surface-2);border-top:1px solid var(--border);font-size:12px;color:var(--text2)}
.stats-bar strong{color:var(--text);font-weight:600}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,18,12,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius);max-width:800px;width:100%;max-height:calc(100vh - 48px);display:flex;flex-direction:column;box-shadow:var(--shadow-md);overflow:hidden}
.modal-lg{max-width:1100px}
.modal-sm{max-width:480px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
.modal-close{font-size:22px;color:var(--text2);line-height:1;padding:4px 8px;border-radius:var(--radius-sm)}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2)}

.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field-label{font-size:12px;font-weight:500;color:var(--text2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* tabs (subtabs) */
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.subtab{padding:10px 16px;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
.subtab:hover{color:var(--text)}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* product card grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);position:relative;transition:all .15s}
.prod-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md)}
.prod-pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.prod-name{font-size:14px;font-weight:600}
.prod-opt{font-size:12px;color:var(--text2)}
.prod-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.prod-actions{display:flex;gap:4px;margin-top:8px}

/* invoice card */
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.inv-card+.inv-card{margin-top:16px}
.inv-head{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.inv-bl{font-family:var(--mono);font-size:14px;font-weight:600}
.inv-meta-row{display:flex;gap:12px;font-size:12px;color:var(--text2);margin-top:4px;flex-wrap:wrap}
.inv-body{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.inv-cat{padding:10px 12px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.inv-cat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.inv-cat-amt{font-size:16px;font-weight:600;font-family:var(--mono);margin-top:2px}
.inv-fwd-list{margin-top:8px;font-size:11px;color:var(--text2);font-family:var(--mono);display:flex;flex-direction:column;gap:2px}
.inv-total{padding:12px 20px;background:var(--accent-bg);border-top:1px solid var(--accent-border);display:flex;justify-content:space-between;align-items:center}
.inv-total-label{font-size:12px;color:var(--accent);font-weight:600}
.inv-total-amt{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.inv-allocs{padding:14px 20px;border-top:1px solid var(--border)}
.inv-attach{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface-2);display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text2)}
.inv-attach a{color:var(--accent);text-decoration:none;padding:4px 8px;border:1px solid var(--accent-border);border-radius:var(--radius-sm);background:var(--surface)}
.inv-attach a:hover{background:var(--accent-bg)}

/* preview cost row */
.preview-tbl{margin-top:12px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.preview-tbl th{background:var(--surface-2);font-size:11px;padding:8px;text-align:right}
.preview-tbl th:first-child{text-align:left}
.preview-tbl td{padding:8px;font-size:12px;text-align:right;font-family:var(--mono);border-top:1px solid var(--border)}
.preview-tbl td:first-child{text-align:left;font-family:var(--sans)}
.preview-tbl td.highlight{font-weight:700;color:var(--accent);background:var(--accent-bg)}

/* dropzone */
.drop{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;background:var(--surface-2)}
.drop:hover,.drop.drag-over{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.attach-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px}
.attach-item a{color:var(--accent);text-decoration:none}

/* image gallery */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px}
.img-tile{position:relative;width:100%;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:all .12s}
.img-tile:hover{border-color:var(--accent);transform:scale(1.02)}
.img-tile img{width:100%;height:100%;object-fit:cover;display:block}
.img-tile-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:14px;line-height:22px;text-align:center;cursor:pointer;opacity:0;transition:opacity .12s}
.img-tile:hover .img-tile-rm{opacity:1}
.img-tile-note{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:3px 6px;text-align:center;opacity:0;transition:opacity .12s}
.img-tile:hover .img-tile-note{opacity:1}
.img-thumb{width:60px;height:60px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);border:1px solid var(--border)}

/* sample card */
.sample-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:grid;grid-template-columns:120px 1fr auto;gap:16px;align-items:start;transition:all .15s}
.sample-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md)}
.sample-card+.sample-card{margin-top:12px}
.sample-thumb{width:120px;height:120px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);border:1px solid var(--border)}
.sample-thumb-empty{width:120px;height:120px;border-radius:var(--radius-sm);background:var(--surface-2);border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.eval-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.eval-item{padding:8px 12px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px}
.eval-rating{color:#d4a426;font-size:14px;letter-spacing:1px}
.eval-meta{color:var(--text3);font-size:11px;margin-top:2px}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out;padding:24px}
.lightbox img{max-width:100%;max-height:100%;border-radius:var(--radius)}
.lightbox-cap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px}

/* toast */
.toast-host{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--text);color:var(--surface);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-md);animation:toast-in .2s ease;pointer-events:auto;max-width:360px}
.toast.success{background:var(--accent)}
.toast.error{background:var(--danger)}
@keyframes toast-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* misc */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.divider{height:1px;background:var(--border);margin:16px 0}
.kbd{display:inline-block;padding:1px 5px;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:3px;color:var(--text2)}

/* schedule / calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:12px}
.cal-cell{background:var(--surface);min-height:96px;padding:6px;display:flex;flex-direction:column;gap:3px;font-size:12px}
.cal-head{background:var(--surface-2);font-size:11px;font-weight:600;color:var(--text2);text-align:center;padding:8px 6px;text-transform:uppercase;letter-spacing:.04em}
.cal-cell.other-month{background:var(--surface-2);color:var(--text3)}
.cal-cell.today{background:var(--accent-bg)}
.cal-date{font-size:11px;font-weight:600;color:var(--text2);font-family:var(--mono)}
.cal-cell.today .cal-date{color:var(--accent)}
.cal-evt{font-size:11px;padding:2px 5px;border-radius:3px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cal-evt.evt-shoot{background:#fde7f3;color:#9a2370;border-color:#f0c0d8}
.cal-evt.evt-sample{background:#e9f0ff;color:#1a4a8b;border-color:#bbcae0}
.cal-evt.evt-order{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.cal-evt.evt-meeting{background:#f0e8fb;color:#5b248c;border-color:#d4c2e8}
.cal-evt.evt-other{background:var(--surface-2);color:var(--text2);border-color:var(--border-strong)}
.cal-evt.evt-done{opacity:.45;text-decoration:line-through}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav .cal-title{font-size:18px;font-weight:600;letter-spacing:-.01em;min-width:140px;text-align:center}

.evt-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.evt-row{display:grid;grid-template-columns:90px 80px 1fr auto;gap:12px;align-items:center;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .12s}
.evt-row:hover{border-color:var(--accent-border);box-shadow:var(--shadow)}
.evt-row.evt-done-row{opacity:.55;background:var(--surface-2)}
.evt-row .evt-date{font-family:var(--mono);font-weight:600;color:var(--accent)}
.evt-row.evt-done-row .evt-date{color:var(--text2);text-decoration:line-through}

/* gallery */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:12px}
.gal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column}
.gal-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.gal-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface-2);display:block}
.gal-img-empty{width:100%;aspect-ratio:1;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text3)}
.gal-meta{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.gal-title{font-size:13px;font-weight:600;line-height:1.3}
.gal-sub{font-size:11px;color:var(--text2)}
.gal-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}

/* defect card */
.def-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;display:grid;grid-template-columns:90px 1fr auto;gap:14px;align-items:start}
.def-card+.def-card{margin-top:10px}
.def-card.severity-high{border-left:4px solid var(--danger)}
.def-card.severity-mid{border-left:4px solid var(--warn)}
.def-card.severity-low{border-left:4px solid var(--accent)}
.def-thumb{width:90px;height:90px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);border:1px solid var(--border)}
.def-thumb-empty{width:90px;height:90px;border-radius:var(--radius-sm);background:var(--surface-2);border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:24px}

/* link list */
.link-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.link-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px}
.link-item a{color:var(--accent);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-item .link-label{font-weight:500;color:var(--text)}

.tl-item::before{content:'';position:absolute;left:-27px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.tl-item.tl-sample::before{background:var(--info)}
.tl-item.tl-order::before{background:var(--warn)}
.tl-item.tl-defect::before{background:var(--danger)}
.tl-item.tl-shoot::before{background:#9a2370}
.tl-date{font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:600}

  .app{grid-template-columns:1fr}

<div id="modal-root"></div>
<div id="toast-root" class="toast-host"></div>

<script>
"use strict";

/* =====================================================================
 *  브랜픽 중국소싱관리 — 원가관리 / 중국발주관리
 *  Single-file vanilla JS app
 * ===================================================================== */

/* ---------- utility ---------- */
const $ = (s, p = document) => p.querySelector(s);
const $$ = (s, p = document) => Array.from(p.querySelectorAll(s));
const uid = (p = '') => p + Math.random().toString(36).slice(2, 9);
const fmt = (n) => (Number(n) || 0).toLocaleString('ko-KR');
const fmtKRW = (n) => '₩' + fmt(Math.round(Number(n) || 0));
const fmtCNY = (n) => '¥' + fmt(Math.round(Number(n) || 0));
const escHTML = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const todayISO = () => new Date().toISOString().slice(0, 10);
const nowISO = () => new Date().toISOString();
const debounce = (fn, ms = 500) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
function restoreFocus(sel) {
  setTimeout(() => {
    const el = $(sel);
    if (!el) return;
    el.focus();
    if (el.setSelectionRange && typeof el.value === 'string') {
      const v = el.value.length;
      try { el.setSelectionRange(v, v); } catch {}
    }
  }, 0);
}
function ymd(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function parseISO(s) {
  if (!s) return null;
  const [y, m, d] = String(s).slice(0, 10).split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}

function toast(msg, type = '') {
  const host = $('#toast-root');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

/* ---------- seed data ---------- *
 * 모든 데이터는 사용자가 직접 입력합니다. 빈 상태로 시작.
 */
const SEED = {
  entities: [],
  forwarders: [],
  customsBrokers: [],
  suppliers: [],
  products: [],
  samples: [],
  invoiceGroups: [],
  orders: [],
  defects: [],         // 완제품 불량
  designAssets: [],    // 디자이너 갤러리 자산
  events: [],          // 일정 / 촬영
};

/* ---------- DB ---------- */
const DB_KEY = 'mongcool_db';
const DB_VERSION = '1.2'; // 1.2: 샘플 차수/진행상황/예정일 + 완제품불량 + 디자이너갤러리 + 일정 탭

function freshDB() {
  return {
    version: DB_VERSION,
    lastUpdated: nowISO(),
    entities: structuredClone(SEED.entities),
    forwarders: structuredClone(SEED.forwarders),
    customsBrokers: structuredClone(SEED.customsBrokers),
    suppliers: structuredClone(SEED.suppliers),
    products: structuredClone(SEED.products),
    samples: structuredClone(SEED.samples),
    invoiceGroups: structuredClone(SEED.invoiceGroups),
    orders: structuredClone(SEED.orders),
    defects: structuredClone(SEED.defects),
    designAssets: structuredClone(SEED.designAssets),
    events: structuredClone(SEED.events),
    filters: { brand: null, entity: null },
  };
}

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return freshDB();
    const db = JSON.parse(raw);

    // v1.0 → v1.1 마이그레이션: 예전 시드 데이터(inv1, e1, sup1 등) 자동 청소
    const looksLikeOldSeed =
      (db.invoiceGroups || []).some((x) => x.id === 'inv1' && x.blNo === 'WHQM1094E010YBPS')
      || ((db.entities || []).length === 3 && db.entities[0]?.id === 'e1' && db.entities[0]?.name === '주식회사 블랙픽');
    if (looksLikeOldSeed && db.version !== DB_VERSION) {
      console.info('[mongcool] 예전 시드 감지 → 빈 상태로 초기화');
      return freshDB();
    }

    // forward-compat: 누락 키 채움
    const fresh = freshDB();
    for (const k of Object.keys(fresh)) if (!(k in db)) db[k] = fresh[k];
    db.version = DB_VERSION;
    return db;
  } catch (e) {
    console.error('loadDB failed', e);
    return freshDB();
  }
}

const persist = debounce(() => {
  state.db.lastUpdated = nowISO();
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(state.db));
    updateLastUpdated();
  } catch (e) {
    toast('저장 실패: ' + e.message, 'error');
  }
}, 300);

function updateLastUpdated() {
  const el = $('#last-updated');
  if (el) el.textContent = (state.db.lastUpdated || '').replace('T', ' ').slice(0, 16);
}

/* ---------- state ---------- */
const state = {
  db: loadDB(),
  tab: 'orders',
  partiesSubtab: 'entities',
  search: '',
  sort: { col: null, dir: 'asc' },
};

/* lookup helpers */
function findById(arr, id) { return arr.find((x) => x.id === id); }
function entityName(id) { return findById(state.db.entities, id)?.name || '-'; }
function forwarderName(id) { return findById(state.db.forwarders, id)?.name || '-'; }
function brokerName(id) { return findById(state.db.customsBrokers, id)?.name || '-'; }
function supplierName(id) { return findById(state.db.suppliers, id)?.name || '-'; }
function productById(id) { return findById(state.db.products, id); }

/* ---------- business logic (spec §5) ---------- */
function calcInvoiceTotals(ig) {
  const totalCustoms = Number(ig.customsDuty) || 0;
  const totalVat = Number(ig.vat) || 0;
  const totalLogistics = (Number(ig.logistics?.clearanceFee) || 0)
    + (ig.logistics?.extras || []).reduce((s, x) => s + (Number(x.amount) || 0), 0);
  const totalForwarding = (ig.forwarding?.items || []).reduce(
    (s, x) => s + (Number(x.amount) || 0) + (Number(x.vat) || 0), 0);
  const extraCost = Number(ig.extraCost) || 0;
  const grandTotal = totalCustoms + totalVat + totalLogistics + totalForwarding + extraCost;
  return { totalCustoms, totalVat, totalLogistics, totalForwarding, extraCost, grandTotal };
}

function calcAllocationBase(ig, orders, products) {
  const groupOrders = orders.filter((o) => o.invoiceId === ig.id);
  let totalCbm = 0, totalQty = 0, totalGoodsValue = 0;
  for (const o of groupOrders) {
    const p = findById(products, o.pid);
    if (!p) continue;
    totalCbm += (Number(p.cbm) || 0) * (Number(o.qty) || 0);
    totalQty += Number(o.qty) || 0;
    totalGoodsValue += (Number(o.qty) || 0) * (Number(o.rate) || 0) * (Number(o.price) || 0);
  }
  return { totalCbm, totalQty, totalGoodsValue };
}

function calcAllocationRates(ig, base) {
  const t = calcInvoiceTotals(ig);
  return {
    forwardingPerCbm: base.totalCbm > 0 ? t.totalForwarding / base.totalCbm : 0,
    logisticsPerUnit: base.totalQty > 0 ? t.totalLogistics / base.totalQty : 0,
    customsRate: base.totalGoodsValue > 0 ? t.totalCustoms / base.totalGoodsValue : 0,
    vatRate: base.totalGoodsValue > 0 ? t.totalVat / base.totalGoodsValue : 0,
    extraPerUnit: base.totalQty > 0 ? t.extraCost / base.totalQty : 0,
  };
}

function calcOrderCost(order, product, rates) {
  const goodsValue = (Number(order.rate) || 0) * (Number(order.price) || 0);
  const forwarding = rates.forwardingPerCbm * (Number(product.cbm) || 0);
  const logistics = rates.logisticsPerUnit;
  const customsDuty = rates.customsRate * goodsValue;
  const vat = rates.vatRate * goodsValue;
  // 발주 자체의 추가비용 (장치료/검사비/지연비 등) → 1개당으로 분배
  const orderExtraTotal = (order.extraCosts || []).reduce((s, x) => s + (Number(x.amount) || 0), 0);
  const orderExtraPerUnit = (Number(order.qty) || 0) > 0 ? orderExtraTotal / order.qty : 0;
  const extra = rates.extraPerUnit + orderExtraPerUnit;
  const costPerUnit = goodsValue + forwarding + logistics + customsDuty + vat + extra;
  return {
    costPerUnit: Math.round(costPerUnit),
    costBreakdown: {
      goodsValue: Math.round(goodsValue),
      forwarding: Math.round(forwarding),
      logistics: Math.round(logistics),
      customsDuty: Math.round(customsDuty),
      vat: Math.round(vat),
      extra: Math.round(extra),
      extraInvoice: Math.round(rates.extraPerUnit),
      extraOrder: Math.round(orderExtraPerUnit),
    },
  };
}

function saveCostsForInvoiceGroup(ig) {
  const base = calcAllocationBase(ig, state.db.orders, state.db.products);
  const rates = calcAllocationRates(ig, base);
  for (const o of state.db.orders.filter((o) => o.invoiceId === ig.id)) {
    const p = productById(o.pid);
    if (!p) continue;
    const r = calcOrderCost(o, p, rates);
    o.costPerUnit = r.costPerUnit;
    o.costBreakdown = r.costBreakdown;
  }
  ig.saved = true;
  persist();
}

function getOrderStatus(order) {
  if (order.arriveDate && (order.extraCosts || []).length > 0) return 'delay';
  if (order.arriveDate) return 'done';
  return 'active';
}

function statusPill(o) {
  if (o.arriveDate && (o.extraCosts || []).length > 0) return '<span class="pill pill-warn">🟡 지연/추가비</span>';
  if (o.arriveDate) return '<span class="pill pill-accent">🟢 입고완료</span>';
  if (o.shipDate && new Date(o.shipDate) > new Date()) return '<span class="pill pill-info">🔵 선적예정</span>';
  if (o.shipDate) return '<span class="pill pill-info">🔵 선적완료</span>';
  if (o.whDate) return '<span class="pill pill-info">🔵 위해입고</span>';
  if (o.factoryDate && new Date(o.factoryDate) > new Date()) return '<span class="pill pill-muted">⚪ 출고예정</span>';
  if (o.factoryDate) return '<span class="pill pill-muted">⚪ 공장출고</span>';
  if (o.factoryMemo) return '<span class="pill pill-warn">🟠 출고 미확인</span>';
  return '<span class="pill pill-muted">⚪ 발주중</span>';
}

/* ---------- router ---------- */
function go(tab) {
  state.tab = tab;
  $$('#nav .nav-item').forEach((n) => n.classList.toggle('active', n.dataset.tab === tab));
  render();
}

/* ---------- filters ---------- */
function applyFilters(orders) {
  const f = state.db.filters;
  let arr = orders;
  if (f.brand) arr = arr.filter((o) => productById(o.pid)?.brand === f.brand);
  if (f.entity) arr = arr.filter((o) => o.entityId === f.entity);
  if (state.search) {
    const q = state.search.toLowerCase();
    arr = arr.filter((o) => {
      const p = productById(o.pid);
      const sup = p ? findById(state.db.suppliers, p.supplierId) : null;
      return [p?.name, p?.option, p?.pcode, p?.ocode, sup?.name, sup?.nameKor, o.poNumber, o.memo]
        .some((s) => String(s || '').toLowerCase().includes(q));
    });
  }
  return arr;
}

/* =====================================================================
 *  RENDER — top-level dispatch
 * ===================================================================== */
function render() {
  populateFilters();
  updateLastUpdated();
  const view = $('#view');
  const title = $('#topbar-title');
  const actions = $('#topbar-actions');
  switch (state.tab) {
    case 'schedule':  title.textContent = '일정 / 촬영';      actions.innerHTML = '<button class="btn btn-primary" onclick="openEventModal()">+ 일정 등록</button>'; renderSchedule(view); break;
    case 'orders':    title.textContent = '발주 추적';        actions.innerHTML = '<button class="btn btn-primary" onclick="openOrderModal()">+ 발주 등록</button>'; renderOrders(view); break;
    case 'invoices':  title.textContent = '청구서 / 원가';    actions.innerHTML = '<button class="btn btn-primary" onclick="openInvoiceModal()">+ 청구서 등록</button>'; renderInvoices(view); break;
    case 'samples':   title.textContent = '샘플 품평';        actions.innerHTML = '<button class="btn btn-primary" onclick="openSampleModal()">+ 샘플 등록</button>'; renderSamples(view); break;
    case 'defects':   title.textContent = '완제품 불량';       actions.innerHTML = '<button class="btn btn-primary" onclick="openDefectModal()">+ 불량 등록</button>'; renderDefects(view); break;
    case 'products':  title.textContent = '제품 DB';           actions.innerHTML = '<button class="btn" onclick="downloadProductTemplate()">엑셀 템플릿</button> <button class="btn" onclick="$(\'#xlsx-import-products\').click()">엑셀 일괄 업로드</button> <button class="btn btn-primary" onclick="openProductModal()">+ 제품 등록</button>'; renderProducts(view); break;
    case 'gallery':   title.textContent = '디자이너 갤러리';   actions.innerHTML = '<button class="btn btn-primary" onclick="openDesignAssetModal()">+ 자료 등록</button>'; renderGallery(view); break;
    case 'companies': title.textContent = '중국 공급처 평가';  actions.innerHTML = '<button class="btn btn-primary" onclick="openSupplierModal()">+ 공급처 등록</button>'; renderCompanies(view); break;
    case 'parties':   title.textContent = '국내 거래처';        actions.innerHTML = ''; renderParties(view); break;
    case 'settings':  title.textContent = '설정';              actions.innerHTML = ''; renderSettings(view); break;
  }
}

/* ---------- sidebar filters ---------- */
function populateFilters() {
  const fb = $('#filter-brand');
  const fe = $('#filter-entity');
  const brands = [...new Set(state.db.products.map((p) => p.brand).filter(Boolean))].sort();
  fb.innerHTML = '<option value="">전체</option>' + brands.map((b) => `<option value="${escHTML(b)}" ${state.db.filters.brand === b ? 'selected' : ''}>${escHTML(b)}</option>`).join('');
  fe.innerHTML = '<option value="">전체</option>' + state.db.entities.map((e) => `<option value="${escHTML(e.id)}" ${state.db.filters.entity === e.id ? 'selected' : ''}>${escHTML(e.name)}</option>`).join('');
}

/* =====================================================================
 *  TAB 1: ORDERS
 * ===================================================================== */
function renderOrders(view) {
  const baseArr = applyFilters(state.db.orders).slice().sort((a, b) => (b.orderDate || '').localeCompare(a.orderDate || ''));

  view.innerHTML = `
    <div class="toolbar">
      <div class="search"><input id="search-orders" placeholder="제품/옵션/공장/PO번호/메모 검색…" value="${escHTML(state.search)}" /></div>
      <select id="filter-status" class="btn" style="padding:8px">
        <option value="">전체 상태</option>
        <option value="active">진행중</option>
        <option value="done">완료</option>
        <option value="delay">지연</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table class="tbl" id="orders-tbl">
        <thead><tr>
          <th>브랜드</th><th>제품/옵션</th><th>법인</th>
          <th class="right">수량</th><th>발주일</th>
          <th>공장출고</th><th>위해입고</th><th>선적</th><th>국내입고</th>
          <th>청구서</th><th>상태</th><th class="right">단가(KRW)</th>
        </tr></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
      <div class="stats-bar" id="orders-stats"></div>
    </div>
  `;

  function paint() {
    const status = $('#filter-status')?.value || '';
    let arr = baseArr;
    if (status) arr = arr.filter((o) => getOrderStatus(o) === status);
    const stats = {
      total: arr.length,
      done: arr.filter((o) => o.arriveDate).length,
      inProg: arr.filter((o) => !o.arriveDate).length,
      delay: arr.filter((o) => o.arriveDate && (o.extraCosts || []).length > 0).length,
      costed: arr.filter((o) => o.invoiceId && o.costBreakdown).length,
      uncosted: arr.filter((o) => !o.invoiceId).length,
    };
    const tbody = $('#orders-tbody');
    tbody.innerHTML = arr.length === 0 ? `<tr><td colspan="12" class="empty">
      발주가 없어요. <br><br>
      <strong>처음 시작하시나요?</strong> 다음 순서로 등록해주세요:<br>
      ① <a href="#" onclick="go('parties');return false" style="color:var(--accent)">거래처</a> 탭 — 법인 / 포워딩사 / 관세사 / 중국공급처 등록 →
      ② <a href="#" onclick="go('products');return false" style="color:var(--accent)">제품 DB</a> 탭 — 제품(브랜드/CBM/공급처) 등록 →
      ③ 우상단 <strong>[+ 발주 등록]</strong> →
      ④ <a href="#" onclick="go('invoices');return false" style="color:var(--accent)">청구서/원가</a> 탭에서 청구서 등록 → 자동 원가 산출
    </td></tr>` : arr.map((o) => {
      const p = productById(o.pid);
      const inv = findById(state.db.invoiceGroups, o.invoiceId);
      return `<tr class="clickable" onclick="openOrderModal('${o.id}')">
        <td>${escHTML(p?.brand || '-')}</td>
        <td><strong>${escHTML(p?.name || '-')}</strong> <span class="muted">${escHTML(p?.option || '')}</span></td>
        <td>${escHTML(entityName(o.entityId))}</td>
        <td class="right mono">${fmt(o.qty)}</td>
        <td class="mono">${escHTML(o.orderDate || '')}</td>
        <td class="mono">${escHTML(o.factoryDate || (o.factoryMemo ? '🟠' : '-'))}</td>
        <td class="mono">${escHTML(o.whDate || '-')}</td>
        <td class="mono">${escHTML(o.shipDate || '-')}</td>
        <td class="mono">${escHTML(o.arriveDate || '-')}</td>

function deleteInvoice(id) {

function downloadProductTemplate() {
  const headers = ['브랜드', '카테고리', '제품명', '옵션명', '제품코드', '옵션코드', 'CBM', '중량(kg)', 'HS코드', '관세율(%)', '공급처명', '발주URL', '이미지URL', 'KC인증', '메모'];
  const example = ['몽쿨', '선풍기', '몽쿨 선풍기', '화이트', 'MGC-FAN', 'MGC-FAN-WH', 0.012, 0.18, '', 0, 'Shenzhen Leleduo Technology Co., Ltd.', '', '', '', ''];
  const ws = XLSX.utils.aoa_to_sheet([headers, example]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '제품');
  XLSX.writeFile(wb, 'mongcool_제품_템플릿.xlsx');
}

function importProductsXlsx(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      let added = 0, skipped = 0;
      for (const r of rows) {
        const ocode = String(r['옵션코드'] || '').trim();
        if (!ocode) { skipped++; continue; }
        if (state.db.products.some((p) => p.ocode === ocode)) { skipped++; continue; }
        const supName = String(r['공급처명'] || '').trim();
        let sup = state.db.suppliers.find((s) => s.name === supName || s.nameKor === supName);
        if (!sup && supName) {
          sup = { id: uid('sup'), name: supName, nameKor: supName, productGroup: '', contactPerson: '', wechat: '', email: '', tel: '', address: '', bankAccount: '', swift: '', paymentTerms: '', leadTime: '', memo: '엑셀 자동생성' };
          state.db.suppliers.push(sup);
        }
        state.db.products.push({
          id: uid('p'),
          brand: String(r['브랜드'] || ''),
          category: String(r['카테고리'] || ''),
          name: String(r['제품명'] || ''),
          option: String(r['옵션명'] || ''),
          pcode: String(r['제품코드'] || ''),
          ocode,
          cbm: Number(r['CBM'] || 0),
          weightKg: Number(r['중량(kg)'] || 0),
          htsCode: String(r['HS코드'] || ''),
          customsRate: Number(r['관세율(%)'] || 0),
          supplierId: sup?.id || '',
          url: String(r['발주URL'] || ''),
          imageUrl: String(r['이미지URL'] || ''),
          kcCert: String(r['KC인증'] || ''),
          memo: String(r['메모'] || ''),
        });
        added++;
      }
      persist();
      toast(`업로드 완료 — 추가 ${added}, 건너뜀 ${skipped}`, 'success');
      render();
    } catch (e) {
      toast('엑셀 파싱 실패: ' + e.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state.db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mongcool_backup_${todayISO()}.json`;
  a.click();
  toast('백업 다운로드 완료', 'success');
}
function importJSON(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj.version || !obj.entities) throw new Error('백업 파일 형식이 아님');
      if (!confirm('현재 데이터를 모두 덮어쓰고 복원합니다. 계속할까요?')) return;
      state.db = obj;
      persist();
      render();
      toast('복원 완료', 'success');
    } catch (err) {
      toast('복원 실패: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}
function resetDB() {
  if (!confirm('정말 전체 초기화 하시겠습니까? 이 작업은 되돌릴 수 없어요.')) return;
  if (!confirm('한 번 더 확인 — 모든 데이터가 시드 상태로 복원됩니다.')) return;
  state.db = freshDB();
  localStorage.removeItem(DB_KEY);
  persist();
  render();
  toast('초기화 완료', 'success');
}

function readImageAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ name: file.name, dataUrl: r.result, sizeBytes: file.size, uploadedAt: nowISO(), note: '' });
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function setupImageDropzone(dropEl, fileInputEl, onAdded) {
  dropEl.onclick = () => fileInputEl.click();
  dropEl.ondragover = (e) => { e.preventDefault(); dropEl.classList.add('drag-over'); };
  dropEl.ondragleave = () => dropEl.classList.remove('drag-over');
  dropEl.ondrop = async (e) => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter((f) => f.type.startsWith('image/'));
    for (const f of files) onAdded(await readImageAsDataUrl(f));
  };
  fileInputEl.onchange = async (e) => {
    for (const f of e.target.files) if (f.type.startsWith('image/')) onAdded(await readImageAsDataUrl(f));
    e.target.value = '';
  };
}
function renderImageGrid(images, onRemove) {
  if (!images || images.length === 0) return '<div class="muted2" style="font-size:12px;margin-top:6px">사진 없음</div>';
  return `<div class="img-grid">${images.map((img, i) => `
    <div class="img-tile" onclick="openLightbox(${JSON.stringify(img.dataUrl).replace(/"/g, '&quot;')}, ${JSON.stringify(img.name || '').replace(/"/g, '&quot;')})">

    </div>
  `).join('')}</div>`;
}
function openLightbox(dataUrl, caption) {

function showModal(html, opts = {}) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay">
    <div class="modal ${opts.lg ? 'modal-lg' : ''} ${opts.sm ? 'modal-sm' : ''}">${html}</div>
  </div>`;
  $('#modal-overlay').onclick = (e) => { if (e.target.id === 'modal-overlay') closeModal(); };
  return root;
}
function closeModal() { $('#modal-root').innerHTML = ''; }

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    const s = $('.search input');
    if (s) s.focus();
  }
});

function submitOrder(id) {
  const rows = $$('#om-rows [data-pid]');
  if (rows.length === 0) { toast('옵션 선택 필요', 'error'); return; }
  const common = {
    entityId: $('#om-entity').value,
    orderDate: $('#om-orderDate').value,
    rate: Number($('#om-rate').value) || 0,
    poNumber: $('#om-po').value,
    factoryDate: $('#om-factoryDate').value,
    whDate: $('#om-whDate').value,
    shipDate: $('#om-shipDate').value,
    arriveDate: $('#om-arriveDate').value,
    invoiceId: $('#om-invoice').value || null,
    memo: $('#om-memo').value,
  };

  const extraCosts = structuredClone(_orderExtras);

  if (id) {
    // edit single order
    const o = findById(state.db.orders, id);
    Object.assign(o, common);
    const row = rows[0];
    o.pid = row.dataset.pid;
    o.qty = Number(row.querySelector('.row-qty').value) || 0;
    o.price = Number(row.querySelector('.row-price').value) || 0;
    o.extraCosts = extraCosts;
    toast('저장됨', 'success');
  } else {
    // create one order per option row
    let n = 0;
    for (const row of rows) {
      const qty = Number(row.querySelector('.row-qty').value) || 0;
      const price = Number(row.querySelector('.row-price').value) || 0;
      if (!qty) continue;
      state.db.orders.push({
        id: uid('o'), pid: row.dataset.pid, ...common, qty, price,
        factoryMemo: '', costPerUnit: 0, costBreakdown: null,
        extraCosts: structuredClone(extraCosts),
        status: 'active',
      });
      n++;
    }
    if (n === 0) { toast('수량 입력 필요', 'error'); return; }
    toast(`${n}건 등록됨`, 'success');
  }

  // recalc if invoice attached
  if (common.invoiceId) {
    const ig = findById(state.db.invoiceGroups, common.invoiceId);
    if (ig?.saved) saveCostsForInvoiceGroup(ig);
  }

  persist();
  closeModal();
  render();
}
function deleteOrder(id) {
  if (!confirm('이 발주를 삭제하시겠습니까?')) return;
  state.db.orders = state.db.orders.filter((o) => o.id !== id);
  persist(); closeModal(); render(); toast('삭제됨');
}

function bindInvoiceModal() {
  // bind data-k inputs
  $$('#modal-root [data-k]').forEach((el) => {
    el.oninput = () => {
      const path = el.dataset.k.split('.');
      let obj = _invDraft;
      for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      const v = el.type === 'number' ? Number(el.value) : el.value;
      obj[path[path.length - 1]] = v;
      refreshInvoiceCalc();
    };
  });
  refreshInvoiceExtras();
  refreshForwardingItems();
  refreshAttaches();
  refreshInvoiceCalc();

  // dropzone
  const drop = $('#inv-drop');
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('drag-over'); };
  drop.ondragleave = () => drop.classList.remove('drag-over');
  drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('drag-over'); handleInvoiceFiles(e.dataTransfer.files); };
  $('#inv-file').onchange = (e) => handleInvoiceFiles(e.target.files);
}
function refreshInvoiceExtras() {
  const wrap = $('#inv-extras');
  if (!wrap) return;
  wrap.innerHTML = (_invDraft.logistics.extras || []).map((x, i) => `
    <div class="field-row-3" style="margin-bottom:8px">
      <div class="field"><input placeholder="항목명 (장치료, 검사비)" value="${escHTML(x.name)}" oninput="_invDraft.logistics.extras[${i}].name=this.value;refreshInvoiceCalc()" /></div>
      <div class="field"><input type="number" placeholder="금액(₩)" value="${x.amount}" oninput="_invDraft.logistics.extras[${i}].amount=Number(this.value)||0;refreshInvoiceCalc()" /></div>
      <div class="field flex"><input placeholder="메모" value="${escHTML(x.note || '')}" oninput="_invDraft.logistics.extras[${i}].note=this.value" /><button class="btn btn-sm btn-danger" onclick="_invDraft.logistics.extras.splice(${i},1);refreshInvoiceExtras();refreshInvoiceCalc()">×</button></div>
    </div>
  `).join('');
}
function addInvoiceExtra() {
  _invDraft.logistics.extras.push({ name: '', amount: 0, note: '' });
  refreshInvoiceExtras(); refreshInvoiceCalc();
}
function refreshForwardingItems() {
  const tbody = $('#inv-fwd-tbl tbody');
  if (!tbody) return;
  tbody.innerHTML = (_invDraft.forwarding.items || []).map((x, i) => `
    <tr>
      <td><input value="${escHTML(x.name)}" placeholder="OCEAN FREIGHT" oninput="_invDraft.forwarding.items[${i}].name=this.value;refreshInvoiceCalc()" /></td>
      <td><input type="number" value="${x.amount}" oninput="_invDraft.forwarding.items[${i}].amount=Number(this.value)||0;refreshInvoiceCalc()" /></td>
      <td><input type="number" value="${x.vat || 0}" oninput="_invDraft.forwarding.items[${i}].vat=Number(this.value)||0;refreshInvoiceCalc()" /></td>
      <td><input value="${escHTML(x.memo || '')}" oninput="_invDraft.forwarding.items[${i}].memo=this.value" /></td>
      <td><button class="btn btn-sm btn-danger" onclick="_invDraft.forwarding.items.splice(${i},1);refreshForwardingItems();refreshInvoiceCalc()">×</button></td>
    </tr>
  `).join('');
}
function addForwardingItem() {
  _invDraft.forwarding.items.push({ name: '', amount: 0, vat: 0, memo: '' });
  refreshForwardingItems(); refreshInvoiceCalc();
}
function handleInvoiceFiles(files) {
  for (const f of files) {
    if (f.size > 5 * 1024 * 1024) { toast(`${f.name}: 5MB 초과 — 일부 브라우저에서 저장 실패할 수 있어요`, 'error'); }
    const reader = new FileReader();
    reader.onload = (e) => {
      _invDraft.attachments.push({ name: f.name, dataUrl: e.target.result, sizeBytes: f.size, uploadedAt: nowISO() });
      refreshAttaches();
    };
    reader.readAsDataURL(f);
  }
  $('#inv-file').value = '';
}
function refreshAttaches() {
  const wrap = $('#inv-attaches');
  if (!wrap) return;
  wrap.innerHTML = (_invDraft.attachments || []).map((a, i) => `
    <div class="attach-item">
      <a href="${a.dataUrl}" download="${escHTML(a.name)}">${escHTML(a.name)}</a>
      <span class="muted">${(a.sizeBytes / 1024).toFixed(1)} KB <button class="btn btn-sm btn-danger" onclick="_invDraft.attachments.splice(${i},1);refreshAttaches()">×</button></span>
    </div>
  `).join('');
}
function refreshInvoiceCalc() {
  const ig = _invDraft;
  const t = calcInvoiceTotals(ig);
  // simulate orders bound to this invoice (existing + any preview)
  const linkedOrders = state.db.orders.filter((o) => o.invoiceId === ig.id);
  const base = calcAllocationBase(ig, linkedOrders, state.db.products);
  const rates = calcAllocationRates(ig, base);

  $('#inv-totals').innerHTML = `
    <div class="field-row-4">
      <div><div class="muted" style="font-size:11px">① 관세</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalCustoms)}</div></div>
      <div><div class="muted" style="font-size:11px">② 부가세</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalVat)}</div></div>
      <div><div class="muted" style="font-size:11px">③ 물류</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalLogistics)}</div></div>
      <div><div class="muted" style="font-size:11px">④ 포워딩</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalForwarding)}</div></div>
    </div>
    <div class="divider"></div>
    <div class="flex" style="justify-content:space-between">
      <div><strong>청구서 총액</strong> <span class="muted">+ 기타 ${fmtKRW(t.extraCost)}</span></div>
      <div class="mono" style="font-size:18px;font-weight:700;color:var(--accent)">${fmtKRW(t.grandTotal)}</div>
    </div>
    <div class="muted mono" style="font-size:11px;margin-top:6px">
      CBM당 포워딩 ${fmtKRW(rates.forwardingPerCbm)} · 개당 물류 ${fmtKRW(rates.logisticsPerUnit)}
      · 실효관세 ${(rates.customsRate * 100).toFixed(2)}% · 실효부가세 ${(rates.vatRate * 100).toFixed(2)}%
    </div>
  `;

  // preview table per linked order
  const prev = $('#inv-preview');
  if (linkedOrders.length === 0) {
    prev.innerHTML = '<div class="muted" style="font-size:12px">연결된 발주가 없어요. 발주 등록 화면에서 이 청구서를 선택하면 자동 매칭됩니다.</div>';
    return;
  }
  prev.innerHTML = `
    <div class="section-title">제품별 가당 도착시가 (실시간 미리보기)</div>
    <table class="preview-tbl">
      <thead><tr><th>제품/옵션</th><th>수량</th><th>물건가</th><th>포워딩</th><th>물류</th><th>관세</th><th>부가세</th><th>도착시가/개</th></tr></thead>
      <tbody>
        ${linkedOrders.map((o) => {
          const p = productById(o.pid); if (!p) return '';
          const r = calcOrderCost(o, p, rates);
          return `<tr>
            <td>${escHTML(p.name)} <span class="muted">${escHTML(p.option || '')}</span></td>
            <td>${fmt(o.qty)}</td>
            <td>${fmtKRW(r.costBreakdown.goodsValue)}</td>
            <td>${fmtKRW(r.costBreakdown.forwarding)}</td>
            <td>${fmtKRW(r.costBreakdown.logistics)}</td>
            <td>${fmtKRW(r.costBreakdown.customsDuty)}</td>
            <td>${fmtKRW(r.costBreakdown.vat)}</td>
            <td class="highlight">${fmtKRW(r.costPerUnit)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function submitInvoice(saved) {
  if (!_invDraft) return;
  const existing = findById(state.db.invoiceGroups, _invDraft.id);
  _invDraft.saved = saved;
  if (existing) Object.assign(existing, _invDraft);
  else state.db.invoiceGroups.push(_invDraft);

  if (saved) {
    const ig = findById(state.db.invoiceGroups, _invDraft.id);
    saveCostsForInvoiceGroup(ig);
    toast('원가 확정 저장됨', 'success');
  } else {
    toast('임시저장됨');
  }
  persist();
  closeModal();
  render();
}

];

function supplierAvgRating(s) {
  const evals = s.evaluations || [];
  if (evals.length === 0) return null;
  return evals.reduce((sum, e) => sum + (Number(e.rating) || 0), 0) / evals.length;
}
function supplierStats(s) {
  // 발주 이력 자동 계산
  const productIds = state.db.products.filter((p) => p.supplierId === s.id).map((p) => p.id);
  const orders = state.db.orders.filter((o) => productIds.includes(o.pid));
  const totalCNY = orders.reduce((sum, o) => sum + (Number(o.qty) || 0) * (Number(o.price) || 0), 0);
  return { orderCount: orders.length, totalCNY, productCount: productIds.length };
}
function renderStars(n) {
  if (!n) return '<span class="muted2">미평가</span>';
  const full = Math.floor(n), half = (n - full) >= 0.5;
  return '<span class="eval-rating">' + '★'.repeat(full) + (half ? '☆' : '') + '</span> <span class="mono muted">' + n.toFixed(1) + '</span>';
}

function renderCompanies(view) {

      </select>
      <span class="muted" id="company-count"></span>
    </div>
    <div id="company-host"></div>
  `;

  function paint() {
    const q = state.search.toLowerCase();
    const tag = $('#filter-tag')?.value || '';
    const all = state.db.suppliers.slice();
    all.sort((a, b) => (supplierAvgRating(b) || 0) - (supplierAvgRating(a) || 0));
    const filt = all.filter((s) => {
      if (q && ![s.name, s.nameKor, s.productGroup, s.contactPerson, s.wechat, ...(s.tags || [])].some((v) => String(v || '').toLowerCase().includes(q))) return false;
      if (tag && !(s.tags || []).includes(tag)) return false;
      return true;
    });
    $('#company-count').innerHTML = `총 <strong>${all.length}</strong>개`;
    $('#company-host').innerHTML = filt.length === 0
      ? `<div class="empty">
          등록된 중국 공급처가 없어요.<br><br>
          우상단 <strong>[+ 공급처 등록]</strong> 으로 추가하세요.<br>

        </div>`
      : `<div id="company-list">${filt.map(renderCompanyCard).join('')}</div>`;
  }

  $('#search-companies').oninput = debounce(() => { state.search = $('#search-companies').value; paint(); }, 200);
  $('#filter-tag').onchange = paint;
  paint();
}
function renderCompanyCard(s) {
  const avg = supplierAvgRating(s);

  return `
    <div class="sample-card" style="cursor:pointer" onclick="openSupplierModal('${s.id}')">
      ${cover ? `<img class="sample-thumb" src="${cover}" alt="" />` : '<div class="sample-thumb-empty">🏭</div>'}

        <div class="flex" style="gap:8px;flex-wrap:wrap;margin-bottom:4px">

        </div>
        <div class="muted2" style="font-size:11px;margin-top:4px">
          📦 등록제품 ${stats.productCount}개 · 🚛 발주 ${stats.orderCount}건 · ¥${fmt(Math.round(stats.totalCNY))}
          ${(s.photos || []).length > 0 ? ' · 📷 ' + s.photos.length + '장' : ''}
        </div>
        ${lastEval ? `<div class="muted2" style="font-size:11px;margin-top:6px">최근 평가 (${escHTML(lastEval.evaluator || '-')}, ${escHTML(lastEval.date || '')}): ${escHTML((lastEval.note || lastEval.pros || lastEval.cons || '').slice(0, 80))}</div>` : ''}
      </div>
      <div class="flex" onclick="event.stopPropagation()">
        <button class="btn btn-sm" onclick="openSupplierModal('${s.id}')">상세 / 평가</button>

function saveProduct(id) {
  const data = {
    brand: $('#p-brand').value.trim(), category: $('#p-cat').value,
    name: $('#p-name').value.trim(), option: $('#p-opt').value,
    pcode: $('#p-pcode').value.trim(), ocode: $('#p-ocode').value.trim(),
    cbm: Number($('#p-cbm').value) || 0, weightKg: Number($('#p-weight').value) || 0,
    htsCode: $('#p-hts').value, customsRate: Number($('#p-customs').value) || 0,
    supplierId: $('#p-sup').value, url: $('#p-url').value, imageUrl: $('#p-img').value,
    kcCert: $('#p-kc').value, memo: $('#p-memo').value,
    shootingNote: $('#p-shooting')?.value || '',
    images: structuredClone(_productImages),
    attachments: structuredClone(_productAttaches),
  };
  if (!data.name || !data.ocode) { toast('제품명/옵션코드 필수', 'error'); return; }
  if (!id && state.db.products.some((p) => p.ocode === data.ocode)) {
    if (!confirm('동일한 옵션코드가 존재합니다. 그래도 추가할까요?')) return;
  }
  if (id) Object.assign(findById(state.db.products, id), data);
  else state.db.products.unshift({ id: uid('p'), ...data });
  persist(); closeModal(); render(); toast('저장됨', 'success');
}

/* =====================================================================
 *  TAB: DEFECTS (완제품 불량)
 * ===================================================================== */
const DEFECT_TYPES = ['외관', '기능', '포장', '수량부족', '오배송', '치수', '색상', '소재', '안전', '기타'];

function defectSeverity(d) {
  const rate = Number(d.defectRate) || 0;
  if (rate >= 5) return 'high';
  if (rate >= 1) return 'mid';
  return 'low';
}

function renderDefects(view) {
  view.innerHTML = `
    <div class="toolbar">
      <div class="search"><input id="search-defects" placeholder="제품/유형/원인/메모 검색…" value="${escHTML(state.search)}" /></div>
      <select id="filter-defect-type" class="btn" style="padding:8px">
        <option value="">전체 유형</option>
        ${DEFECT_TYPES.map((t) => `<option value="${escHTML(t)}">${escHTML(t)}</option>`).join('')}
      </select>
      <select id="filter-defect-status" class="btn" style="padding:8px">
        <option value="">전체 상태</option>
        <option value="open">미해결</option>
        <option value="resolved">해결됨</option>
      </select>
      <span class="muted" id="defect-count"></span>
    </div>
    <div id="defect-host"></div>
  `;

  function paint() {
    const q = state.search.toLowerCase();
    const ft = $('#filter-defect-type')?.value || '';
    const fs = $('#filter-defect-status')?.value || '';
    const arr = state.db.defects.slice().sort((a, b) => (b.reportedDate || '').localeCompare(a.reportedDate || ''));
    const filt = arr.filter((d) => {
      const p = productById(d.productId);
      const hay = [p?.name, p?.option, d.defectType, d.cause, d.resolution, d.memo].map((v) => String(v || '').toLowerCase()).join(' ');
      if (q && !hay.includes(q)) return false;
      if (ft && d.defectType !== ft) return false;
      if (fs === 'open' && d.resolved) return false;
      if (fs === 'resolved' && !d.resolved) return false;
      return true;
    });
    $('#defect-count').innerHTML = `총 <strong>${arr.length}</strong>건`;
    $('#defect-host').innerHTML = filt.length === 0
      ? `<div class="empty">
          등록된 불량이 없어요.<br><br>
          국내 입고 후 발견된 완제품 불량을 우상단 <strong>[+ 불량 등록]</strong> 으로 기록하세요.<br>

      : filt.map(renderDefectCard).join('');
  }

  $('#search-defects').oninput = debounce(() => { state.search = $('#search-defects').value; paint(); }, 200);
  $('#filter-defect-type').onchange = paint;
  $('#filter-defect-status').onchange = paint;
  paint();
}
function renderDefectCard(d) {
  const p = productById(d.productId);
  const order = findById(state.db.orders, d.orderId);
  const sev = defectSeverity(d);
  const cover = (d.photos && d.photos[0]) ? d.photos[0].dataUrl : null;
  return `
    <div class="def-card severity-${sev}" onclick="openDefectModal('${d.id}')" style="cursor:pointer">

          ${d.defectType ? `<span class="pill pill-warn">${escHTML(d.defectType)}</span>` : ''}

          ${order ? ` · 발주 <span class="mono">${escHTML(order.poNumber || order.id.slice(0,6))}</span> · 수량 ${fmt(order.qty)}` : ''}
          ${(d.photos || []).length > 0 ? ` · 📷 ${d.photos.length}장` : ''}
          ${(d.attachments || []).length > 0 ? ` · 📎 ${d.attachments.length}` : ''}
        </div>
        ${d.cause ? `<div style="font-size:12px;margin-top:4px"><strong class="muted">원인:</strong> ${escHTML(d.cause)}</div>` : ''}
        ${d.resolution ? `<div style="font-size:12px;margin-top:2px"><strong class="muted">조치:</strong> ${escHTML(d.resolution)}</div>` : ''}
      </div>
      <div class="flex" onclick="event.stopPropagation()">

function refreshDefectPhotos() {
  const wrap = $('#df-photos');
  if (!wrap) return;
  wrap.innerHTML = renderImageGrid(_defectDraft.photos, '_dfRemovePhoto');
}
window._dfRemovePhoto = (i) => { _defectDraft.photos.splice(i, 1); refreshDefectPhotos(); };
function refreshDefectAttaches() {
  const wrap = $('#df-attaches');
  if (!wrap) return;
  const list = _defectDraft.attachments || [];
  if (list.length === 0) { wrap.innerHTML = '<div class="muted2" style="font-size:12px">링크 없음</div>'; return; }

function addDefectAttach() {
  _defectDraft.attachments = _defectDraft.attachments || [];
  _defectDraft.attachments.push({ id: uid('at'), label: '', url: '', kind: 'drive', addedAt: nowISO() });
  refreshDefectAttaches();
}
function submitDefect() {
  if (!_defectDraft.productId) { toast('제품 선택 필수', 'error'); return; }
  const ex = findById(state.db.defects, _defectDraft.id);
  if (ex) Object.assign(ex, _defectDraft);
  else state.db.defects.unshift(structuredClone(_defectDraft));
  persist(); closeModal(); render(); toast('저장됨', 'success');
}
function deleteDefect(id) {
  if (!confirm('이 불량 기록을 삭제하시겠습니까?')) return;
  state.db.defects = state.db.defects.filter((d) => d.id !== id);

}

/* =====================================================================
 *  TAB: DESIGNER GALLERY (디자이너 갤러리)
 *  - 디자이너가 패키지/제품샷/시안을 자료로 등록 + 비주얼 갤러리
 *  - 제품/샘플/공급처/불량 사진까지 모아 보는 통합 모드 지원
 * ===================================================================== */
const ASSET_KINDS = ['패키지', '제품샷', '시안', '디테일컷', '상세페이지', '광고소재', '계약서', '기타'];

function renderGallery(view) {
  view.innerHTML = `
    <div class="toolbar">
      <div class="search"><input id="search-gallery" placeholder="이름/브랜드/카테고리/디자이너/메모 검색…" value="${escHTML(state.search)}" /></div>
      <select id="filter-asset-kind" class="btn" style="padding:8px">
        <option value="">전체 유형</option>
        ${ASSET_KINDS.map((k) => `<option value="${escHTML(k)}">${escHTML(k)}</option>`).join('')}
      </select>
      <select id="filter-asset-source" class="btn" style="padding:8px">
        <option value="all">전체 소스</option>
        <option value="design">디자인 자료만</option>
        <option value="product">제품 사진만</option>
        <option value="sample">샘플 사진만</option>
        <option value="defect">불량 사진만</option>
      </select>
      <span class="muted" id="gallery-count"></span>
    </div>
    <div id="gallery-host"></div>
  `;

  function collectAll() {
    // 통합 갤러리: 여러 소스의 이미지를 단일 셰이프로 모음
    const items = [];
    for (const a of state.db.designAssets) {
      const cover = (a.images && a.images[0]) ? a.images[0].dataUrl : null;
      items.push({
        kind: 'design', srcId: a.id, title: a.name, sub: `${a.kind || '자료'} · ${a.designer || '-'}`,
        brand: a.brand || '', category: a.category || '', cover, count: (a.images || []).length,
        searchHay: [a.name, a.brand, a.category, a.designer, a.kind, a.memo, ...(a.tags || [])].join(' ').toLowerCase(),
        kindLabel: a.kind || '자료',
        onClick: `openDesignAssetModal('${a.id}')`,
      });
    }
    for (const p of state.db.products) {
      const imgs = p.images || [];
      if (imgs.length === 0 && !p.imageUrl) continue;
      const cover = imgs[0]?.dataUrl || p.imageUrl;
      items.push({
        kind: 'product', srcId: p.id, title: p.name, sub: `제품 · ${p.option || ''}`,
        brand: p.brand || '', category: p.category || '', cover, count: imgs.length || (p.imageUrl ? 1 : 0),
        searchHay: [p.name, p.option, p.brand, p.category, p.pcode, p.ocode].join(' ').toLowerCase(),
        kindLabel: '제품',
        onClick: `openProductDetail('${p.id}')`,
      });
    }
    for (const s of state.db.samples) {
      if (!(s.images || []).length) continue;
      items.push({
        kind: 'sample', srcId: s.id, title: s.name, sub: `샘플 ${Number(s.sampleRound)||1}차 · ${s.progress || ''}`,
        brand: s.brand || '', category: s.category || '', cover: s.images[0].dataUrl, count: s.images.length,
        searchHay: [s.name, s.brand, s.category, s.progressNote, s.memo].join(' ').toLowerCase(),
        kindLabel: '샘플',
        onClick: `openSampleModal('${s.id}')`,
      });
    }
    for (const d of state.db.defects) {
      if (!(d.photos || []).length) continue;
      const p = productById(d.productId);
      items.push({
        kind: 'defect', srcId: d.id, title: `[불량] ${p?.name || '미지정'}`, sub: `${d.defectType || ''} · ${d.reportedDate || ''}`,
        brand: p?.brand || '', category: p?.category || '', cover: d.photos[0].dataUrl, count: d.photos.length,
        searchHay: [p?.name, d.defectType, d.cause, d.memo].join(' ').toLowerCase(),
        kindLabel: '불량',
        onClick: `openDefectModal('${d.id}')`,
      });
    }
    return items;
  }

  function paint() {
    const q = state.search.toLowerCase();
    const fk = $('#filter-asset-kind')?.value || '';
    const fs = $('#filter-asset-source')?.value || 'all';
    let items = collectAll();
    if (fs !== 'all') {
      const map = { design: 'design', product: 'product', sample: 'sample', defect: 'defect' };
      items = items.filter((it) => it.kind === map[fs]);
    }
    if (fk) items = items.filter((it) => it.kindLabel === fk);
    if (q) items = items.filter((it) => it.searchHay.includes(q));

    $('#gallery-count').innerHTML = `총 <strong>${items.length}</strong>개`;
    $('#gallery-host').innerHTML = items.length === 0
      ? `<div class="empty">
          갤러리에 표시할 이미지가 없어요.<br><br>
          <strong>[+ 자료 등록]</strong> 으로 디자이너가 패키지·제품샷·시안을 업로드하거나,<br>
          제품 DB·샘플 품평·불량 등록 시 사진을 함께 올리면 여기에 자동으로 모입니다.
        </div>`
      : `<div class="gal-grid">
          ${items.map((it) => {
            const srcPill = {
              design: '<span class="pill pill-info">🎨 자료</span>',
              product: '<span class="pill pill-accent">📦 제품</span>',
              sample: '<span class="pill pill-warn">🧪 샘플</span>',
              defect: '<span class="pill pill-danger">🛑 불량</span>',
            }[it.kind];
            return `<div class="gal-card" onclick="${it.onClick}">
              ${it.cover ? `<img class="gal-img" src="${it.cover}" alt="" loading="lazy" />` : '<div class="gal-img-empty">🎨</div>'}
              <div class="gal-meta">
                <div class="gal-pills">
                  ${srcPill}
                  ${it.brand ? `<span class="pill pill-muted">${escHTML(it.brand)}</span>` : ''}
                </div>
                <div class="gal-title">${escHTML(it.title)}</div>
                <div class="gal-sub">${escHTML(it.sub)} · 📷 ${it.count}장</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
  }

  $('#search-gallery').oninput = debounce(() => { state.search = $('#search-gallery').value; paint(); }, 200);
  $('#filter-asset-kind').onchange = paint;
  $('#filter-asset-source').onchange = paint;
  paint();
}

/* =====================================================================
 *  TAB: SCHEDULE (일정 / 촬영)
 *  - 자체 등록 events + 발주의 도착예정일 + 샘플의 expectedDate 자동 수집
 *  - "진행 일정만" 기본 + "완료" 별도 섹션
 *  - 월간 캘린더 + 리스트 뷰 토글
 * ===================================================================== */
const EVENT_TYPES = ['촬영', '샘플도착', '발주', '미팅', '기타'];

function collectScheduleEvents() {
  // 자동 수집 + 사용자 등록 events 통합
  const all = [];
  for (const e of state.db.events || []) {
    all.push({
      kind: 'manual', id: e.id, type: e.type || '기타', title: e.title || '(제목없음)',
      date: e.date || '', time: e.time || '',
      productId: e.productId || '', orderId: e.orderId || '', sampleId: e.sampleId || '',
      memo: e.memo || '', done: !!e.done,
      onClick: `openEventModal('${e.id}')`,
    });
  }
  // 샘플 도착예정 자동 수집 (미도래만)
  for (const s of state.db.samples || []) {
    if (!s.expectedDate) continue;
    const decision = s.finalDecision || s.status || 'pending';
    const reached = (s.progress === '도착') || (s.progress === '평가중') || (s.progress === '결재대기') || decision !== 'pending';
    all.push({
      kind: 'auto-sample', id: 'sm-' + s.id, type: '샘플도착', title: `🧪 ${Number(s.sampleRound)||1}차 ${s.name}`,
      date: s.expectedDate, time: '',
      productId: '', orderId: '', sampleId: s.id, memo: s.progressNote || '',
      done: reached,
      onClick: `openSampleModal('${s.id}')`,
    });
  }
  // 발주 도착예정 자동 수집
  for (const o of state.db.orders || []) {
    const p = productById(o.pid);
    if (o.shipDate && !o.arriveDate) {
      // 선적은 했는데 아직 국내 입고 X
      all.push({
        kind: 'auto-order', id: 'po-' + o.id, type: '발주', title: `🚛 ${p?.name || '발주'} 선적/입고 대기`,
        date: o.shipDate, time: '',
        productId: o.pid, orderId: o.id, sampleId: '', memo: o.poNumber || '',
        done: !!o.arriveDate,
        onClick: `openOrderModal('${o.id}')`,
      });
    }
  }
  return all;
}

function renderSchedule(view) {
  view.innerHTML = `
    <div class="toolbar">
      <div class="cal-nav">
        <button class="btn btn-sm" onclick="schedNav(-1)">← 이전 달</button>
        <div class="cal-title" id="sched-title"></div>
        <button class="btn btn-sm" onclick="schedNav(1)">다음 달 →</button>
        <button class="btn btn-sm" onclick="schedToday()">오늘</button>
      </div>
      <div class="flex-1"></div>
      <select id="filter-event-type" class="btn" style="padding:8px">
        <option value="">전체 유형</option>
        ${EVENT_TYPES.map((t) => `<option value="${escHTML(t)}">${escHTML(t)}</option>`).join('')}
      </select>
      <select id="schedule-view" class="btn" style="padding:8px">
        <option value="month">📅 캘린더</option>
        <option value="list">📋 리스트</option>
      </select>
    </div>
    <div id="sched-host"></div>
    <div class="section-title mt-6" style="display:flex;align-items:center;gap:8px">
      <span>✓ 완료된 일정</span>
      <button class="btn btn-sm" onclick="schedToggleDone()" id="sched-done-toggle">접기 ▾</button>
    </div>
    <div id="sched-done" style="margin-top:8px"></div>
  `;

  if (!state.schedCursor) state.schedCursor = todayISO().slice(0, 7); // YYYY-MM
  if (!state.schedView) state.schedView = 'month';
  if (state.schedDoneCollapsed === undefined) state.schedDoneCollapsed = false;
  $('#schedule-view').value = state.schedView;
  $('#schedule-view').onchange = (e) => { state.schedView = e.target.value; paint(); };
  $('#filter-event-type').onchange = paint;

  function paint() {
    const ft = $('#filter-event-type')?.value || '';
    const cur = state.schedCursor;
    const [y, m] = cur.split('-').map(Number);
    $('#sched-title').textContent = `${y}년 ${m}월`;

    let evts = collectScheduleEvents();
    if (ft) evts = evts.filter((e) => e.type === ft);

    const ongoing = evts.filter((e) => !e.done);
    const done = evts.filter((e) => e.done);

    if (state.schedView === 'month') {
      $('#sched-host').innerHTML = renderCalendarMonth(y, m, ongoing);
    } else {
      $('#sched-host').innerHTML = renderEventList(ongoing, '진행 중인 일정 없음');
    }

    $('#sched-done').innerHTML = state.schedDoneCollapsed
      ? `<div class="muted" style="font-size:12px">완료 ${done.length}건 (펼치려면 위 버튼 클릭)</div>`
      : (done.length === 0 ? '<div class="muted" style="font-size:12px">완료된 일정 없음</div>' : renderEventList(done, '완료된 일정 없음', true));
    $('#sched-done-toggle').textContent = state.schedDoneCollapsed ? `펼치기 ▸ (${done.length})` : `접기 ▾ (${done.length})`;
  }

  // 다른 탭에서 잘못 호출되어도 안전하도록 가드
  const safePaint = () => { if ($('#sched-title')) paint(); };
  window.schedNav = (delta) => {
    const [y, m] = state.schedCursor.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    state.schedCursor = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    safePaint();
  };
  window.schedToday = () => { state.schedCursor = todayISO().slice(0, 7); safePaint(); };
  window.schedToggleDone = () => { state.schedDoneCollapsed = !state.schedDoneCollapsed; safePaint(); };

  paint();
}

function renderCalendarMonth(year, month, events) {
  const first = new Date(year, month - 1, 1);
  const startDow = first.getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = todayISO();

  // 6 weeks * 7 days
  const cells = [];
  // leading from prev month
  for (let i = startDow - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, -i);
    cells.push({ date: ymd(d), other: true });
  }
  for (let day = 1; day <= daysInMonth; day++) {
    cells.push({ date: ymd(new Date(year, month - 1, day)), other: false });
  }
  // trailing
  while (cells.length % 7 !== 0 || cells.length < 35) {
    const last = parseISO(cells[cells.length - 1].date);
    last.setDate(last.getDate() + 1);
    cells.push({ date: ymd(last), other: last.getMonth() !== month - 1 });
  }

  // group events by date
  const byDate = {};
  for (const e of events) {
    if (!e.date) continue;
    (byDate[e.date] = byDate[e.date] || []).push(e);
  }

  const dows = ['일', '월', '화', '수', '목', '금', '토'];
  return `
    <div class="cal-grid">
      ${dows.map((d) => `<div class="cal-head">${d}</div>`).join('')}
      ${cells.map((c) => {
        const dayNum = parseISO(c.date).getDate();
        const isToday = c.date === today;
        const evts = byDate[c.date] || [];
        return `<div class="cal-cell ${c.other ? 'other-month' : ''} ${isToday ? 'today' : ''}">
          <div class="cal-date">${dayNum}</div>
          ${evts.map((e) => {
            const cls = ({
              '촬영': 'evt-shoot', '샘플도착': 'evt-sample', '발주': 'evt-order',
              '미팅': 'evt-meeting',
            })[e.type] || 'evt-other';
            const safeOnclick = e.onClick.replace(/'/g, "\\'");
            return `<div class="cal-evt ${cls} ${e.done ? 'evt-done' : ''}" title="${escHTML(e.title)}" onclick="${e.onClick}">${escHTML(e.title)}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderEventList(events, emptyMsg, isDone) {
  if (events.length === 0) return `<div class="muted" style="font-size:12px;padding:12px">${escHTML(emptyMsg)}</div>`;
  const sorted = events.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const today = todayISO();
  return `<div class="evt-list">
    ${sorted.map((e) => {
      const overdue = !isDone && e.date && e.date < today;
      const typeLabel = ({
        '촬영': '📸', '샘플도착': '🧪', '발주': '🚛', '미팅': '🤝', '기타': '📌',
      })[e.type] || '📌';
      return `<div class="evt-row ${isDone ? 'evt-done-row' : ''}" onclick="${e.onClick}">
        <div class="evt-date">${escHTML(e.date || '-')}${e.time ? ' ' + escHTML(e.time) : ''}</div>
        <div><span class="pill pill-muted">${typeLabel} ${escHTML(e.type)}</span></div>
        <div>
          <div style="font-weight:600">${escHTML(e.title)} ${overdue ? '<span class="pill pill-danger">⏰ 지연</span>' : ''}</div>
          ${e.memo ? `<div class="muted" style="font-size:11px">${escHTML(e.memo)}</div>` : ''}
        </div>
        <div class="muted2" style="font-size:11px">${e.kind === 'manual' ? '수동' : '자동'}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function openProductDetail(id) {

  const defects = state.db.defects.filter((d) => d.productId === id).slice().sort((a, b) => (b.reportedDate || '').localeCompare(a.reportedDate || ''));

  const lastCost = orders.find((o) => o.costPerUnit)?.costPerUnit || 0;
  const defectCount = defects.length;

  for (const e of events) {
    timeline.push({ date: e.date || '', kind: e.type === '촬영' ? 'shoot' : 'order', label: `${e.type === '촬영' ? '📸' : '📌'} ${e.type} — ${e.title}${e.done ? ' (완료)' : ''}`, ref: e.id, refType: 'event' });
