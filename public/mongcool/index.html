<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>MONGCOOL 수출입원가관리 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface-2:#faf9f5;--border:#e8e6df;--border-strong:#d6d3ca;
  --text:#1a1917;--text2:#6b6860;--text3:#a09e99;
  --accent:#1a6b4a;--accent-bg:#e8f3ed;--accent-border:#b8dcc8;
  --warn:#8a5e00;--warn-bg:#fdf6e3;--warn-border:#e8d8a0;
  --danger:#8b2020;--danger-bg:#f9e8e8;--danger-border:#e0bbbb;
  --info:#1a4a8b;--info-bg:#e8eef9;--info-border:#bbcae0;
  --radius:8px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --sans:'Noto Sans KR',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
input[type="number"]{font-family:var(--mono);text-align:right}
input[type="date"]{font-family:var(--mono)}
table{width:100%;border-collapse:collapse}
.mono{font-family:var(--mono)}
.muted{color:var(--text2)}
.muted2{color:var(--text3)}
.right{text-align:right}.center{text-align:center}
.flex{display:flex;gap:8px;align-items:center}.flex-1{flex:1}
.col{display:flex;flex-direction:column;gap:8px}
.gap-4{gap:16px}.gap-6{gap:24px}
.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.hidden{display:none!important}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid transparent}
.pill-accent{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.pill-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.pill-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.pill-info{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.pill-muted{background:var(--surface-2);color:var(--text2);border-color:var(--border)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);transition:all .15s ease;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#155539;border-color:#155539}
.btn-danger{color:var(--danger);border-color:var(--danger-border)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{padding:6px 8px;font-size:12px}

/* layout */
.app{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:8px;padding:6px 4px 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
.brand-icon{width:30px;height:30px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.brand-name{font-weight:700;font-size:14px;letter-spacing:-.02em}
.brand-sub{font-size:11px;color:var(--text2);font-family:var(--mono)}

.filter-block{display:flex;flex-direction:column;gap:6px;padding:8px 0}
.filter-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.filter-block select{padding:6px 8px;font-size:13px}

.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s ease}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.nav-icon{width:18px;text-align:center;font-size:14px}

.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:600;letter-spacing:-.02em}
.topbar-actions{display:flex;gap:8px}
.view{flex:1;overflow-y:auto;padding:24px}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card+.card{margin-top:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:600;letter-spacing:-.01em}

.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl{font-size:13px}
.tbl th{background:var(--surface-2);text-align:left;padding:10px 12px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:var(--text)}
.tbl th.sort-asc::after{content:' ▲';font-size:9px;color:var(--accent)}
.tbl th.sort-desc::after{content:' ▼';font-size:9px;color:var(--accent)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:background .12s}
.tbl tr.clickable:hover{background:var(--surface-2)}
.tbl input,.tbl select{padding:4px 6px;font-size:12px;border-color:transparent;background:transparent}
.tbl input:hover,.tbl select:hover{border-color:var(--border-strong)}
.tbl input:focus,.tbl select:focus{background:var(--surface)}

/* search/toolbar */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search{position:relative;flex:1;min-width:200px;max-width:400px}
.search input{padding-left:32px}
.search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}

/* stats bar */
.stats-bar{display:flex;gap:16px;padding:12px 16px;background:var(--surface-2);border-top:1px solid var(--border);font-size:12px;color:var(--text2)}
.stats-bar strong{color:var(--text);font-weight:600}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,18,12,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius);max-width:800px;width:100%;max-height:calc(100vh - 48px);display:flex;flex-direction:column;box-shadow:var(--shadow-md);overflow:hidden}
.modal-lg{max-width:1100px}
.modal-sm{max-width:480px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
.modal-close{font-size:22px;color:var(--text2);line-height:1;padding:4px 8px;border-radius:var(--radius-sm)}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2)}

.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field-label{font-size:12px;font-weight:500;color:var(--text2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* tabs (subtabs) */
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.subtab{padding:10px 16px;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
.subtab:hover{color:var(--text)}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* product card grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);position:relative;transition:all .15s}
.prod-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md)}
.prod-pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.prod-name{font-size:14px;font-weight:600}
.prod-opt{font-size:12px;color:var(--text2)}
.prod-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.prod-actions{display:flex;gap:4px;margin-top:8px}

/* invoice card */
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.inv-card+.inv-card{margin-top:16px}
.inv-head{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.inv-bl{font-family:var(--mono);font-size:14px;font-weight:600}
.inv-meta-row{display:flex;gap:12px;font-size:12px;color:var(--text2);margin-top:4px;flex-wrap:wrap}
.inv-body{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.inv-cat{padding:10px 12px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.inv-cat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.inv-cat-amt{font-size:16px;font-weight:600;font-family:var(--mono);margin-top:2px}
.inv-fwd-list{margin-top:8px;font-size:11px;color:var(--text2);font-family:var(--mono);display:flex;flex-direction:column;gap:2px}
.inv-total{padding:12px 20px;background:var(--accent-bg);border-top:1px solid var(--accent-border);display:flex;justify-content:space-between;align-items:center}
.inv-total-label{font-size:12px;color:var(--accent);font-weight:600}
.inv-total-amt{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.inv-allocs{padding:14px 20px;border-top:1px solid var(--border)}
.inv-attach{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface-2);display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text2)}
.inv-attach a{color:var(--accent);text-decoration:none;padding:4px 8px;border:1px solid var(--accent-border);border-radius:var(--radius-sm);background:var(--surface)}
.inv-attach a:hover{background:var(--accent-bg)}

/* preview cost row */
.preview-tbl{margin-top:12px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.preview-tbl th{background:var(--surface-2);font-size:11px;padding:8px;text-align:right}
.preview-tbl th:first-child{text-align:left}
.preview-tbl td{padding:8px;font-size:12px;text-align:right;font-family:var(--mono);border-top:1px solid var(--border)}
.preview-tbl td:first-child{text-align:left;font-family:var(--sans)}
.preview-tbl td.highlight{font-weight:700;color:var(--accent);background:var(--accent-bg)}

/* dropzone */
.drop{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:24px;text-align:center;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;background:var(--surface-2)}
.drop:hover,.drop.drag-over{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.attach-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px}
.attach-item a{color:var(--accent);text-decoration:none}

/* image gallery */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px}
.img-tile{position:relative;width:100%;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:all .12s}
.img-tile:hover{border-color:var(--accent);transform:scale(1.02)}
.img-tile img{width:100%;height:100%;object-fit:cover;display:block}
.img-tile-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:14px;line-height:22px;text-align:center;cursor:pointer;opacity:0;transition:opacity .12s}
.img-tile:hover .img-tile-rm{opacity:1}
.img-tile-note{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:3px 6px;text-align:center;opacity:0;transition:opacity .12s}
.img-tile:hover .img-tile-note{opacity:1}
.img-thumb{width:60px;height:60px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);border:1px solid var(--border)}

/* sample card */
.sample-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:grid;grid-template-columns:120px 1fr auto;gap:16px;align-items:start;transition:all .15s}
.sample-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md)}
.sample-card+.sample-card{margin-top:12px}
.sample-thumb{width:120px;height:120px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface-2);border:1px solid var(--border)}
.sample-thumb-empty{width:120px;height:120px;border-radius:var(--radius-sm);background:var(--surface-2);border:1px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.eval-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.eval-item{padding:8px 12px;background:var(--surface-2);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px}
.eval-rating{color:#d4a426;font-size:14px;letter-spacing:1px}
.eval-meta{color:var(--text3);font-size:11px;margin-top:2px}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;cursor:zoom-out;padding:24px}
.lightbox img{max-width:100%;max-height:100%;border-radius:var(--radius)}
.lightbox-cap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px}

/* toast */
.toast-host{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--text);color:var(--surface);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-md);animation:toast-in .2s ease;pointer-events:auto;max-width:360px}
.toast.success{background:var(--accent)}
.toast.error{background:var(--danger)}
@keyframes toast-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* misc */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.divider{height:1px;background:var(--border);margin:16px 0}
.kbd{display:inline-block;padding:1px 5px;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:3px;color:var(--text2)}

@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .field-row,.field-row-3,.field-row-4{grid-template-columns:1fr}
  .inv-body{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">M</div>
      <div>
        <div class="brand-name">MONGCOOL</div>
        <div class="brand-sub">원가관리 v3</div>
      </div>
    </div>

    <div class="filter-block">
      <div class="filter-label">브랜드</div>
      <select id="filter-brand"><option value="">전체</option></select>
    </div>
    <div class="filter-block">
      <div class="filter-label">법인</div>
      <select id="filter-entity"><option value="">전체</option></select>
    </div>

    <div class="nav" id="nav">
      <div class="nav-item" data-tab="orders"><span class="nav-icon">🚛</span>발주 추적</div>
      <div class="nav-item" data-tab="invoices"><span class="nav-icon">🧾</span>청구서/원가</div>
      <div class="nav-item" data-tab="samples"><span class="nav-icon">🧪</span>샘플 품평</div>
      <div class="nav-item" data-tab="products"><span class="nav-icon">📦</span>제품 DB</div>
      <div class="nav-item" data-tab="parties"><span class="nav-icon">🏢</span>거래처</div>
      <div class="nav-item" data-tab="settings"><span class="nav-icon">⚙</span>설정</div>
    </div>

    <div class="sidebar-footer">
      마지막 업데이트<br/>
      <span id="last-updated" class="mono"></span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">발주 추적</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>
    <div class="view" id="view"></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast-root" class="toast-host"></div>

<script>
"use strict";

/* =====================================================================
 *  MONGCOOL 수출입원가관리 v3
 *  Single-file vanilla JS app — see specification doc for details.
 * ===================================================================== */

/* ---------- utility ---------- */
const $ = (s, p = document) => p.querySelector(s);
const $$ = (s, p = document) => Array.from(p.querySelectorAll(s));
const uid = (p = '') => p + Math.random().toString(36).slice(2, 9);
const fmt = (n) => (Number(n) || 0).toLocaleString('ko-KR');
const fmtKRW = (n) => '₩' + fmt(Math.round(Number(n) || 0));
const fmtCNY = (n) => '¥' + fmt(Math.round(Number(n) || 0));
const escHTML = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const todayISO = () => new Date().toISOString().slice(0, 10);
const nowISO = () => new Date().toISOString();
const debounce = (fn, ms = 500) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

function toast(msg, type = '') {
  const host = $('#toast-root');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || '');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

/* ---------- seed data ---------- *
 * 모든 데이터는 사용자가 직접 입력합니다. 빈 상태로 시작.
 */
const SEED = {
  entities: [],
  forwarders: [],
  customsBrokers: [],
  suppliers: [],
  products: [],
  samples: [],
  invoiceGroups: [],
  orders: [],
};

/* ---------- DB ---------- */
const DB_KEY = 'mongcool_db';
const DB_VERSION = '1.1'; // 1.1: 시드 비움 (사용자가 직접 입력)

function freshDB() {
  return {
    version: DB_VERSION,
    lastUpdated: nowISO(),
    entities: structuredClone(SEED.entities),
    forwarders: structuredClone(SEED.forwarders),
    customsBrokers: structuredClone(SEED.customsBrokers),
    suppliers: structuredClone(SEED.suppliers),
    products: structuredClone(SEED.products),
    samples: structuredClone(SEED.samples),
    invoiceGroups: structuredClone(SEED.invoiceGroups),
    orders: structuredClone(SEED.orders),
    filters: { brand: null, entity: null },
  };
}

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return freshDB();
    const db = JSON.parse(raw);

    // v1.0 → v1.1 마이그레이션: 예전 시드 데이터(inv1, e1, sup1 등) 자동 청소
    const looksLikeOldSeed =
      (db.invoiceGroups || []).some((x) => x.id === 'inv1' && x.blNo === 'WHQM1094E010YBPS')
      || ((db.entities || []).length === 3 && db.entities[0]?.id === 'e1' && db.entities[0]?.name === '주식회사 블랙픽');
    if (looksLikeOldSeed && db.version !== DB_VERSION) {
      console.info('[mongcool] 예전 시드 감지 → 빈 상태로 초기화');
      return freshDB();
    }

    // forward-compat: 누락 키 채움
    const fresh = freshDB();
    for (const k of Object.keys(fresh)) if (!(k in db)) db[k] = fresh[k];
    db.version = DB_VERSION;
    return db;
  } catch (e) {
    console.error('loadDB failed', e);
    return freshDB();
  }
}

/* lookup helpers */
function findById(arr, id) { return arr.find((x) => x.id === id); }
function entityName(id) { return findById(state.db.entities, id)?.name || '-'; }
function forwarderName(id) { return findById(state.db.forwarders, id)?.name || '-'; }
function brokerName(id) { return findById(state.db.customsBrokers, id)?.name || '-'; }
function supplierName(id) { return findById(state.db.suppliers, id)?.name || '-'; }
function productById(id) { return findById(state.db.products, id); }

/* ---------- business logic (spec §5) ---------- */
function calcInvoiceTotals(ig) {
  const totalCustoms = Number(ig.customsDuty) || 0;
  const totalVat = Number(ig.vat) || 0;
  const totalLogistics = (Number(ig.logistics?.clearanceFee) || 0)
    + (ig.logistics?.extras || []).reduce((s, x) => s + (Number(x.amount) || 0), 0);
  const totalForwarding = (ig.forwarding?.items || []).reduce(
    (s, x) => s + (Number(x.amount) || 0) + (Number(x.vat) || 0), 0);
  const extraCost = Number(ig.extraCost) || 0;
  const grandTotal = totalCustoms + totalVat + totalLogistics + totalForwarding + extraCost;
  return { totalCustoms, totalVat, totalLogistics, totalForwarding, extraCost, grandTotal };
}

function calcAllocationBase(ig, orders, products) {
  const groupOrders = orders.filter((o) => o.invoiceId === ig.id);
  let totalCbm = 0, totalQty = 0, totalGoodsValue = 0;
  for (const o of groupOrders) {
    const p = findById(products, o.pid);
    if (!p) continue;
    totalCbm += (Number(p.cbm) || 0) * (Number(o.qty) || 0);
    totalQty += Number(o.qty) || 0;
    totalGoodsValue += (Number(o.qty) || 0) * (Number(o.rate) || 0) * (Number(o.price) || 0);
  }
  return { totalCbm, totalQty, totalGoodsValue };
}

function calcAllocationRates(ig, base) {
  const t = calcInvoiceTotals(ig);
  return {
    forwardingPerCbm: base.totalCbm > 0 ? t.totalForwarding / base.totalCbm : 0,
    logisticsPerUnit: base.totalQty > 0 ? t.totalLogistics / base.totalQty : 0,
    customsRate: base.totalGoodsValue > 0 ? t.totalCustoms / base.totalGoodsValue : 0,
    vatRate: base.totalGoodsValue > 0 ? t.totalVat / base.totalGoodsValue : 0,
    extraPerUnit: base.totalQty > 0 ? t.extraCost / base.totalQty : 0,
  };
}

function calcOrderCost(order, product, rates) {
  const goodsValue = (Number(order.rate) || 0) * (Number(order.price) || 0);
  const forwarding = rates.forwardingPerCbm * (Number(product.cbm) || 0);
  const logistics = rates.logisticsPerUnit;
  const customsDuty = rates.customsRate * goodsValue;
  const vat = rates.vatRate * goodsValue;
  // 발주 자체의 추가비용 (장치료/검사비/지연비 등) → 1개당으로 분배
  const orderExtraTotal = (order.extraCosts || []).reduce((s, x) => s + (Number(x.amount) || 0), 0);
  const orderExtraPerUnit = (Number(order.qty) || 0) > 0 ? orderExtraTotal / order.qty : 0;
  const extra = rates.extraPerUnit + orderExtraPerUnit;
  const costPerUnit = goodsValue + forwarding + logistics + customsDuty + vat + extra;
  return {
    costPerUnit: Math.round(costPerUnit),
    costBreakdown: {
      goodsValue: Math.round(goodsValue),
      forwarding: Math.round(forwarding),
      logistics: Math.round(logistics),
      customsDuty: Math.round(customsDuty),
      vat: Math.round(vat),
      extra: Math.round(extra),
      extraInvoice: Math.round(rates.extraPerUnit),
      extraOrder: Math.round(orderExtraPerUnit),
    },
  };
}

function saveCostsForInvoiceGroup(ig) {
  const base = calcAllocationBase(ig, state.db.orders, state.db.products);
  const rates = calcAllocationRates(ig, base);
  for (const o of state.db.orders.filter((o) => o.invoiceId === ig.id)) {
    const p = productById(o.pid);
    if (!p) continue;
    const r = calcOrderCost(o, p, rates);
    o.costPerUnit = r.costPerUnit;
    o.costBreakdown = r.costBreakdown;
  }
  ig.saved = true;
  persist();
}

function getOrderStatus(order) {
  if (order.arriveDate && (order.extraCosts || []).length > 0) return 'delay';
  if (order.arriveDate) return 'done';
  return 'active';
}

function statusPill(o) {
  if (o.arriveDate && (o.extraCosts || []).length > 0) return '<span class="pill pill-warn">🟡 지연/추가비</span>';
  if (o.arriveDate) return '<span class="pill pill-accent">🟢 입고완료</span>';
  if (o.shipDate && new Date(o.shipDate) > new Date()) return '<span class="pill pill-info">🔵 선적예정</span>';
  if (o.shipDate) return '<span class="pill pill-info">🔵 선적완료</span>';
  if (o.whDate) return '<span class="pill pill-info">🔵 위해입고</span>';
  if (o.factoryDate && new Date(o.factoryDate) > new Date()) return '<span class="pill pill-muted">⚪ 출고예정</span>';
  if (o.factoryDate) return '<span class="pill pill-muted">⚪ 공장출고</span>';
  if (o.factoryMemo) return '<span class="pill pill-warn">🟠 출고 미확인</span>';
  return '<span class="pill pill-muted">⚪ 발주중</span>';
}

/* ---------- router ---------- */
function go(tab) {
  state.tab = tab;
  $$('#nav .nav-item').forEach((n) => n.classList.toggle('active', n.dataset.tab === tab));
  render();
}

/* ---------- filters ---------- */
function applyFilters(orders) {
  const f = state.db.filters;
  let arr = orders;
  if (f.brand) arr = arr.filter((o) => productById(o.pid)?.brand === f.brand);
  if (f.entity) arr = arr.filter((o) => o.entityId === f.entity);
  if (state.search) {
    const q = state.search.toLowerCase();
    arr = arr.filter((o) => {
      const p = productById(o.pid);
      const sup = p ? findById(state.db.suppliers, p.supplierId) : null;
      return [p?.name, p?.option, p?.pcode, p?.ocode, sup?.name, sup?.nameKor, o.poNumber, o.memo]
        .some((s) => String(s || '').toLowerCase().includes(q));
    });
  }
  return arr;
}

function downloadProductTemplate() {

  const example = ['몽쿨', '선풍기', '몽쿨 선풍기', '화이트', 'MGC-FAN', 'MGC-FAN-WH', 0.012, 0.18, '', 0, 'Shenzhen Leleduo Technology Co., Ltd.', '', '', '', ''];
  const ws = XLSX.utils.aoa_to_sheet([headers, example]);
  const wb = XLSX.utils.book_new();

  XLSX.writeFile(wb, 'mongcool_제품_템플릿.xlsx');

function importProductsXlsx(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      let added = 0, skipped = 0;
      for (const r of rows) {
        const ocode = String(r['옵션코드'] || '').trim();
        if (!ocode) { skipped++; continue; }
        if (state.db.products.some((p) => p.ocode === ocode)) { skipped++; continue; }
        const supName = String(r['공급처명'] || '').trim();
        let sup = state.db.suppliers.find((s) => s.name === supName || s.nameKor === supName);
        if (!sup && supName) {
          sup = { id: uid('sup'), name: supName, nameKor: supName, productGroup: '', contactPerson: '', wechat: '', email: '', tel: '', address: '', bankAccount: '', swift: '', paymentTerms: '', leadTime: '', memo: '엑셀 자동생성' };
          state.db.suppliers.push(sup);
        }
        state.db.products.push({
          id: uid('p'),
          brand: String(r['브랜드'] || ''),
          category: String(r['카테고리'] || ''),
          name: String(r['제품명'] || ''),
          option: String(r['옵션명'] || ''),
          pcode: String(r['제품코드'] || ''),
          ocode,
          cbm: Number(r['CBM'] || 0),
          weightKg: Number(r['중량(kg)'] || 0),
          htsCode: String(r['HS코드'] || ''),
          customsRate: Number(r['관세율(%)'] || 0),
          supplierId: sup?.id || '',
          url: String(r['발주URL'] || ''),
          imageUrl: String(r['이미지URL'] || ''),
          kcCert: String(r['KC인증'] || ''),
          memo: String(r['메모'] || ''),
        });
        added++;
      }
      persist();
      toast(`업로드 완료 — 추가 ${added}, 건너뜀 ${skipped}`, 'success');
      render();
    } catch (e) {
      toast('엑셀 파싱 실패: ' + e.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state.db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mongcool_backup_${todayISO()}.json`;
  a.click();
  toast('백업 다운로드 완료', 'success');
}
function importJSON(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj.version || !obj.entities) throw new Error('백업 파일 형식이 아님');
      if (!confirm('현재 데이터를 모두 덮어쓰고 복원합니다. 계속할까요?')) return;
      state.db = obj;
      persist();
      render();
      toast('복원 완료', 'success');
    } catch (err) {
      toast('복원 실패: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}
function resetDB() {
  if (!confirm('정말 전체 초기화 하시겠습니까? 이 작업은 되돌릴 수 없어요.')) return;
  if (!confirm('한 번 더 확인 — 모든 데이터가 시드 상태로 복원됩니다.')) return;
  state.db = freshDB();
  localStorage.removeItem(DB_KEY);
  persist();
  render();
  toast('초기화 완료', 'success');
}

function readImageAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ name: file.name, dataUrl: r.result, sizeBytes: file.size, uploadedAt: nowISO(), note: '' });
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function setupImageDropzone(dropEl, fileInputEl, onAdded) {
  dropEl.onclick = () => fileInputEl.click();
  dropEl.ondragover = (e) => { e.preventDefault(); dropEl.classList.add('drag-over'); };
  dropEl.ondragleave = () => dropEl.classList.remove('drag-over');
  dropEl.ondrop = async (e) => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files).filter((f) => f.type.startsWith('image/'));
    for (const f of files) onAdded(await readImageAsDataUrl(f));
  };
  fileInputEl.onchange = async (e) => {
    for (const f of e.target.files) if (f.type.startsWith('image/')) onAdded(await readImageAsDataUrl(f));
    e.target.value = '';
  };
}
function renderImageGrid(images, onRemove) {
  if (!images || images.length === 0) return '<div class="muted2" style="font-size:12px;margin-top:6px">사진 없음</div>';

function renderSampleCard(s) {
  const sup = findById(state.db.suppliers, s.supplierId);
  const status = s.status || 'pending';
  const statusPills = {
    pending: '<span class="pill pill-warn">⏳ 평가중</span>',

    rejected: '<span class="pill pill-danger">✗ 반려</span>',
  };
  const evals = s.evaluations || [];
  const avg = evals.length ? (evals.reduce((sum, e) => sum + (Number(e.rating) || 0), 0) / evals.length).toFixed(1) : null;
  const cover = (s.images && s.images[0]) ? s.images[0].dataUrl : null;
  return `
    <div class="sample-card" onclick="openSampleModal('${s.id}')" style="cursor:pointer">
      ${cover ? `<img class="sample-thumb" src="${cover}" alt="" />` : '<div class="sample-thumb-empty">📷</div>'}
      <div>
        <div class="flex" style="gap:8px;flex-wrap:wrap">
          ${s.brand ? `<span class="pill pill-accent">${escHTML(s.brand)}</span>` : ''}
          ${s.category ? `<span class="pill pill-muted">${escHTML(s.category)}</span>` : ''}
          ${statusPills[status]}
          ${avg ? `<span class="pill pill-info">⭐ ${avg} (${evals.length})</span>` : ''}
        </div>
        <div style="font-size:15px;font-weight:600;margin-top:6px">${escHTML(s.name)}</div>
        <div class="muted" style="font-size:12px;margin-top:2px">

          접수일: <span class="mono">${escHTML(s.receivedDate || '-')}</span> ·
          사진 ${(s.images || []).length}장
        </div>
        ${s.memo ? `<div class="muted" style="font-size:12px;margin-top:4px">${escHTML(s.memo)}</div>` : ''}
        ${evals.length > 0 ? `<div class="muted2" style="font-size:11px;margin-top:6px">최근 평가: ${escHTML(evals[evals.length - 1].evaluator || '-')} — ${escHTML((evals[evals.length - 1].note || '').slice(0, 60))}</div>` : ''}
      </div>
      <div class="flex" onclick="event.stopPropagation()">
        <button class="btn btn-sm" onclick="openSampleModal('${s.id}')">편집</button>
        ${status === 'approved' ? `<button class="btn btn-sm btn-primary" onclick="convertSampleToProduct('${s.id}')">→ 제품등록</button>` : ''}
        <button class="btn btn-sm btn-danger" onclick="deleteSample('${s.id}')">삭제</button>

function showModal(html, opts = {}) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay">
    <div class="modal ${opts.lg ? 'modal-lg' : ''} ${opts.sm ? 'modal-sm' : ''}">${html}</div>
  </div>`;
  $('#modal-overlay').onclick = (e) => { if (e.target.id === 'modal-overlay') closeModal(); };
  return root;
}
function closeModal() { $('#modal-root').innerHTML = ''; }

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    const s = $('.search input');
    if (s) s.focus();
  }
});

  if (id) {
    // edit single order
    const o = findById(state.db.orders, id);
    Object.assign(o, common);
    const row = rows[0];
    o.pid = row.dataset.pid;
    o.qty = Number(row.querySelector('.row-qty').value) || 0;
    o.price = Number(row.querySelector('.row-price').value) || 0;
    o.extraCosts = extraCosts;
    toast('저장됨', 'success');
  } else {
    // create one order per option row
    let n = 0;
    for (const row of rows) {
      const qty = Number(row.querySelector('.row-qty').value) || 0;
      const price = Number(row.querySelector('.row-price').value) || 0;
      if (!qty) continue;
      state.db.orders.push({
        id: uid('o'), pid: row.dataset.pid, ...common, qty, price,
        factoryMemo: '', costPerUnit: 0, costBreakdown: null,
        extraCosts: structuredClone(extraCosts),
        status: 'active',
      });
      n++;
    }
    if (n === 0) { toast('수량 입력 필요', 'error'); return; }
    toast(`${n}건 등록됨`, 'success');
  }

  // recalc if invoice attached
  if (common.invoiceId) {
    const ig = findById(state.db.invoiceGroups, common.invoiceId);
    if (ig?.saved) saveCostsForInvoiceGroup(ig);
  }

  persist();
  closeModal();
  render();
}
function deleteOrder(id) {
  if (!confirm('이 발주를 삭제하시겠습니까?')) return;
  state.db.orders = state.db.orders.filter((o) => o.id !== id);
  persist(); closeModal(); render(); toast('삭제됨');
}

function bindInvoiceModal() {
  // bind data-k inputs
  $$('#modal-root [data-k]').forEach((el) => {
    el.oninput = () => {
      const path = el.dataset.k.split('.');
      let obj = _invDraft;
      for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
      const v = el.type === 'number' ? Number(el.value) : el.value;
      obj[path[path.length - 1]] = v;
      refreshInvoiceCalc();
    };
  });
  refreshInvoiceExtras();
  refreshForwardingItems();
  refreshAttaches();
  refreshInvoiceCalc();

  // dropzone
  const drop = $('#inv-drop');
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('drag-over'); };
  drop.ondragleave = () => drop.classList.remove('drag-over');
  drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('drag-over'); handleInvoiceFiles(e.dataTransfer.files); };
  $('#inv-file').onchange = (e) => handleInvoiceFiles(e.target.files);
}
function refreshInvoiceExtras() {
  const wrap = $('#inv-extras');
  if (!wrap) return;
  wrap.innerHTML = (_invDraft.logistics.extras || []).map((x, i) => `
    <div class="field-row-3" style="margin-bottom:8px">
      <div class="field"><input placeholder="항목명 (장치료, 검사비)" value="${escHTML(x.name)}" oninput="_invDraft.logistics.extras[${i}].name=this.value;refreshInvoiceCalc()" /></div>
      <div class="field"><input type="number" placeholder="금액(₩)" value="${x.amount}" oninput="_invDraft.logistics.extras[${i}].amount=Number(this.value)||0;refreshInvoiceCalc()" /></div>
      <div class="field flex"><input placeholder="메모" value="${escHTML(x.note || '')}" oninput="_invDraft.logistics.extras[${i}].note=this.value" /><button class="btn btn-sm btn-danger" onclick="_invDraft.logistics.extras.splice(${i},1);refreshInvoiceExtras();refreshInvoiceCalc()">×</button></div>
    </div>
  `).join('');
}
function addInvoiceExtra() {
  _invDraft.logistics.extras.push({ name: '', amount: 0, note: '' });
  refreshInvoiceExtras(); refreshInvoiceCalc();
}
function refreshForwardingItems() {
  const tbody = $('#inv-fwd-tbl tbody');
  if (!tbody) return;
  tbody.innerHTML = (_invDraft.forwarding.items || []).map((x, i) => `
    <tr>
      <td><input value="${escHTML(x.name)}" placeholder="OCEAN FREIGHT" oninput="_invDraft.forwarding.items[${i}].name=this.value;refreshInvoiceCalc()" /></td>
      <td><input type="number" value="${x.amount}" oninput="_invDraft.forwarding.items[${i}].amount=Number(this.value)||0;refreshInvoiceCalc()" /></td>
      <td><input type="number" value="${x.vat || 0}" oninput="_invDraft.forwarding.items[${i}].vat=Number(this.value)||0;refreshInvoiceCalc()" /></td>
      <td><input value="${escHTML(x.memo || '')}" oninput="_invDraft.forwarding.items[${i}].memo=this.value" /></td>
      <td><button class="btn btn-sm btn-danger" onclick="_invDraft.forwarding.items.splice(${i},1);refreshForwardingItems();refreshInvoiceCalc()">×</button></td>
    </tr>
  `).join('');
}
function addForwardingItem() {
  _invDraft.forwarding.items.push({ name: '', amount: 0, vat: 0, memo: '' });
  refreshForwardingItems(); refreshInvoiceCalc();
}
function handleInvoiceFiles(files) {
  for (const f of files) {
    if (f.size > 5 * 1024 * 1024) { toast(`${f.name}: 5MB 초과 — 일부 브라우저에서 저장 실패할 수 있어요`, 'error'); }
    const reader = new FileReader();
    reader.onload = (e) => {
      _invDraft.attachments.push({ name: f.name, dataUrl: e.target.result, sizeBytes: f.size, uploadedAt: nowISO() });
      refreshAttaches();
    };
    reader.readAsDataURL(f);
  }
  $('#inv-file').value = '';
}
function refreshAttaches() {
  const wrap = $('#inv-attaches');
  if (!wrap) return;
  wrap.innerHTML = (_invDraft.attachments || []).map((a, i) => `
    <div class="attach-item">
      <a href="${a.dataUrl}" download="${escHTML(a.name)}">${escHTML(a.name)}</a>
      <span class="muted">${(a.sizeBytes / 1024).toFixed(1)} KB <button class="btn btn-sm btn-danger" onclick="_invDraft.attachments.splice(${i},1);refreshAttaches()">×</button></span>
    </div>
  `).join('');
}
function refreshInvoiceCalc() {
  const ig = _invDraft;
  const t = calcInvoiceTotals(ig);
  // simulate orders bound to this invoice (existing + any preview)
  const linkedOrders = state.db.orders.filter((o) => o.invoiceId === ig.id);
  const base = calcAllocationBase(ig, linkedOrders, state.db.products);
  const rates = calcAllocationRates(ig, base);

  $('#inv-totals').innerHTML = `
    <div class="field-row-4">
      <div><div class="muted" style="font-size:11px">① 관세</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalCustoms)}</div></div>
      <div><div class="muted" style="font-size:11px">② 부가세</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalVat)}</div></div>
      <div><div class="muted" style="font-size:11px">③ 물류</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalLogistics)}</div></div>
      <div><div class="muted" style="font-size:11px">④ 포워딩</div><div class="mono" style="font-weight:600">${fmtKRW(t.totalForwarding)}</div></div>
    </div>
    <div class="divider"></div>
    <div class="flex" style="justify-content:space-between">
      <div><strong>청구서 총액</strong> <span class="muted">+ 기타 ${fmtKRW(t.extraCost)}</span></div>
      <div class="mono" style="font-size:18px;font-weight:700;color:var(--accent)">${fmtKRW(t.grandTotal)}</div>
    </div>
    <div class="muted mono" style="font-size:11px;margin-top:6px">
      CBM당 포워딩 ${fmtKRW(rates.forwardingPerCbm)} · 개당 물류 ${fmtKRW(rates.logisticsPerUnit)}
      · 실효관세 ${(rates.customsRate * 100).toFixed(2)}% · 실효부가세 ${(rates.vatRate * 100).toFixed(2)}%
    </div>
  `;

  // preview table per linked order
  const prev = $('#inv-preview');
  if (linkedOrders.length === 0) {
    prev.innerHTML = '<div class="muted" style="font-size:12px">연결된 발주가 없어요. 발주 등록 화면에서 이 청구서를 선택하면 자동 매칭됩니다.</div>';
    return;
  }
  prev.innerHTML = `
    <div class="section-title">제품별 가당 도착시가 (실시간 미리보기)</div>
    <table class="preview-tbl">
      <thead><tr><th>제품/옵션</th><th>수량</th><th>물건가</th><th>포워딩</th><th>물류</th><th>관세</th><th>부가세</th><th>도착시가/개</th></tr></thead>
      <tbody>
        ${linkedOrders.map((o) => {
          const p = productById(o.pid); if (!p) return '';
          const r = calcOrderCost(o, p, rates);
          return `<tr>
            <td>${escHTML(p.name)} <span class="muted">${escHTML(p.option || '')}</span></td>
            <td>${fmt(o.qty)}</td>
            <td>${fmtKRW(r.costBreakdown.goodsValue)}</td>
            <td>${fmtKRW(r.costBreakdown.forwarding)}</td>
            <td>${fmtKRW(r.costBreakdown.logistics)}</td>
            <td>${fmtKRW(r.costBreakdown.customsDuty)}</td>
            <td>${fmtKRW(r.costBreakdown.vat)}</td>
            <td class="highlight">${fmtKRW(r.costPerUnit)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function submitInvoice(saved) {
  if (!_invDraft) return;
  const existing = findById(state.db.invoiceGroups, _invDraft.id);
  _invDraft.saved = saved;
  if (existing) Object.assign(existing, _invDraft);
  else state.db.invoiceGroups.push(_invDraft);

  if (saved) {
    const ig = findById(state.db.invoiceGroups, _invDraft.id);
    saveCostsForInvoiceGroup(ig);
    toast('원가 확정 저장됨', 'success');
  } else {
    toast('임시저장됨');
  }
  persist();
  closeModal();
  render();
}

/* ---------- Product modal ---------- */
let _productImages = [];
function openProductModal(id) {
  const isEdit = !!id;
  const p = isEdit ? findById(state.db.products, id) : { id: uid('p'), brand: '', category: '', name: '', option: '', pcode: '', ocode: '', cbm: 0, weightKg: 0, htsCode: '', customsRate: 0, supplierId: state.db.suppliers[0]?.id || '', url: '', imageUrl: '', kcCert: '', memo: '', images: [] };
  // pull pending images from sample-conversion flow if any
  _productImages = isEdit ? structuredClone(p.images || []) : (window._pendingProductImages || []);
  window._pendingProductImages = null;
  showModal(`
    <div class="modal-header"><div class="modal-title">${isEdit ? '제품 편집' : '제품 등록'}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label class="field-label">브랜드*</label><input id="p-brand" value="${escHTML(p.brand)}" list="brand-list" />
          <datalist id="brand-list">${[...new Set(state.db.products.map((x) => x.brand).filter(Boolean))].map((b) => `<option value="${escHTML(b)}">`).join('')}</datalist>
        </div>
        <div class="field"><label class="field-label">카테고리</label><input id="p-cat" value="${escHTML(p.category)}" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">제품명*</label><input id="p-name" value="${escHTML(p.name)}" /></div>
        <div class="field"><label class="field-label">옵션명</label><input id="p-opt" value="${escHTML(p.option)}" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">제품코드*</label><input id="p-pcode" value="${escHTML(p.pcode)}" /></div>
        <div class="field"><label class="field-label">옵션코드*</label><input id="p-ocode" value="${escHTML(p.ocode)}" /></div>
      </div>
      <div class="field-row-4">
        <div class="field"><label class="field-label">CBM (㎥)*</label><input type="number" step="0.0001" id="p-cbm" value="${p.cbm}" /></div>
        <div class="field"><label class="field-label">중량 (kg)</label><input type="number" step="0.01" id="p-weight" value="${p.weightKg}" /></div>
        <div class="field"><label class="field-label">HS코드</label><input id="p-hts" value="${escHTML(p.htsCode)}" /></div>
        <div class="field"><label class="field-label">관세율(%)</label><input type="number" step="0.01" id="p-customs" value="${p.customsRate}" /></div>
      </div>
      <div class="field"><label class="field-label">공급처</label>
        <select id="p-sup">${state.db.suppliers.map((s) => `<option value="${s.id}" ${p.supplierId === s.id ? 'selected' : ''}>${escHTML(s.nameKor || s.name)}</option>`).join('')}</select>
      </div>
      <div class="field-row">
        <div class="field"><label class="field-label">발주 URL (1688)</label><input id="p-url" value="${escHTML(p.url)}" /></div>
        <div class="field"><label class="field-label">대표 이미지 URL (외부)</label><input id="p-img" value="${escHTML(p.imageUrl)}" /></div>
      </div>
      <div class="field"><label class="field-label">KC 인증</label><input id="p-kc" value="${escHTML(p.kcCert)}" placeholder="인증번호 또는 '면제'" /></div>

      <div class="section-title mt-6">📷 제품 사진 (드래그 또는 클릭, 여러 장 OK)</div>
      <div class="drop" id="p-drop">사진 파일을 끌어다 놓거나 클릭해서 선택</div>
      <input type="file" id="p-file" accept="image/*" multiple class="hidden" />
      <div id="p-images"></div>

      <div class="field mt-4"><label class="field-label">메모</label><textarea id="p-memo" rows="2">${escHTML(p.memo)}</textarea></div>
    </div>
    <div class="modal-footer"><div class="flex-1"></div><button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveProduct('${isEdit ? id : ''}')">${isEdit ? '저장' : '등록'}</button>
    </div>
  `, { lg: true });
  setupImageDropzone($('#p-drop'), $('#p-file'), (img) => { _productImages.push(img); refreshProductImages(); });
  refreshProductImages();
}
function refreshProductImages() {
  const wrap = $('#p-images');
  if (!wrap) return;
  wrap.innerHTML = renderImageGrid(_productImages, '_pRemoveImg');
}
window._pRemoveImg = (i) => { _productImages.splice(i, 1); refreshProductImages(); };

function saveProduct(id) {
  const data = {
    brand: $('#p-brand').value.trim(), category: $('#p-cat').value,
    name: $('#p-name').value.trim(), option: $('#p-opt').value,
    pcode: $('#p-pcode').value.trim(), ocode: $('#p-ocode').value.trim(),
    cbm: Number($('#p-cbm').value) || 0, weightKg: Number($('#p-weight').value) || 0,
    htsCode: $('#p-hts').value, customsRate: Number($('#p-customs').value) || 0,
    supplierId: $('#p-sup').value, url: $('#p-url').value, imageUrl: $('#p-img').value,
    kcCert: $('#p-kc').value, memo: $('#p-memo').value,
    images: structuredClone(_productImages),
  };
  if (!data.name || !data.ocode) { toast('제품명/옵션코드 필수', 'error'); return; }
  if (!id && state.db.products.some((p) => p.ocode === data.ocode)) {
    if (!confirm('동일한 옵션코드가 존재합니다. 그래도 추가할까요?')) return;
  }
  if (id) Object.assign(findById(state.db.products, id), data);
  else state.db.products.unshift({ id: uid('p'), ...data });
  persist(); closeModal(); render(); toast('저장됨', 'success');
}

});

Object.defineProperty(window, '_productImages', { get: () => _productImages, set: (v) => { _productImages = v; } });

});

go('orders');
</script>
