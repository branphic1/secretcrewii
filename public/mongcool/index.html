      ${designs.length > 0 ? `
        <div class="section-title mt-6">🎨 연결된 디자인 자료 (${designs.length}건)</div>
        <div class="gal-grid">
          ${designs.map((a) => {
            const cover = (a.images && a.images[0]) ? a.images[0].dataUrl : null;
            return `<div class="gal-card" onclick="openDesignAssetModal('${a.id}')">
              ${cover ? `<img class="gal-img" src="${cover}" alt="" />` : '<div class="gal-img-empty">🎨</div>'}
              <div class="gal-meta">
                <div class="gal-pills"><span class="pill pill-info">${escHTML(a.kind || '자료')}</span></div>
                <div class="gal-title">${escHTML(a.name)}</div>
                <div class="gal-sub">${escHTML(a.designer || '-')} · 📷 ${(a.images || []).length}장</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      ` : ''}

      <div class="section-title mt-6">🕒 통합 이력 타임라인</div>
      ${timeline.length === 0 ? '<div class="muted" style="font-size:13px">아직 기록된 이력이 없어요.</div>' : `
        <div class="tl">
          ${timeline.map((t) => `
            <div class="tl-item tl-${t.kind}" style="cursor:pointer" onclick="${t.refType === 'sample' ? `openSampleModal('${t.ref}')` : t.refType === 'order' ? `openOrderModal('${t.ref}')` : t.refType === 'defect' ? `openDefectModal('${t.ref}')` : t.refType === 'event' ? `openEventModal('${t.ref}')` : ''}">
              <div class="tl-date">${escHTML(t.date || '-')}</div>
              <div class="tl-body">${escHTML(t.label)}</div>
            </div>
          `).join('')}
        </div>
      `}

      ${(p.attachments || []).length > 0 ? `
        <div class="section-title mt-6">📎 외부 첨부 (${p.attachments.length})</div>
        <div class="link-list">
          ${p.attachments.map((a) => `
            <div class="link-item">
              <span class="link-kind">${escHTML(a.kind || 'link')}</span>
              <span class="link-label">${escHTML(a.label || '(라벨 없음)')}</span>
              <a href="${escHTML(a.url)}" target="_blank" rel="noopener">${escHTML(a.url)}</a>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteProduct('${id}')">삭제</button>
      <div class="flex-1"></div>
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" onclick="closeModal();openProductModal('${id}')">제품 정보 편집</button>
    </div>
  `, { lg: true });
}

function saveProductShootingNote(id) {
  const p = productById(id);
  if (!p) return;
  p.shootingNote = $('#pd-shootingNote').value;
  persist();
  toast('촬영 메모 저장됨', 'success');
}
function quickEventForProduct(productId, type) {
  closeModal();
  setTimeout(() => {
    openEventModal();
    setTimeout(() => {
      const sel = $('[data-ek="productId"]');
      if (sel) { sel.value = productId; sel.dispatchEvent(new Event('change')); }
      const ts = $('[data-ek="type"]');
      if (ts) { ts.value = type; ts.dispatchEvent(new Event('change')); }
    }, 50);
  }, 50);
}

/* ---------- expose globals (so onclick handlers work) ---------- */
Object.assign(window, {
  $, go, closeModal, openLightbox,
  openOrderModal, submitOrder, deleteOrder, addOrderExtra, refreshOrderExtras,
  openInvoiceModal, submitInvoice, deleteInvoice, addInvoiceExtra, addForwardingItem,
  refreshInvoiceExtras, refreshForwardingItems, refreshAttaches, refreshInvoiceCalc,
  openProductModal, saveProduct, duplicateProduct, deleteProduct, refreshProductImages,
  refreshProductAttaches, addProductAttach, openProductDetail, saveProductShootingNote, quickEventForProduct,
  openSampleModal, submitSample, deleteSample, addSampleEvaluation, refreshSampleEvals, refreshSampleImages, convertSampleToProduct,
  refreshSampleAttaches, addSampleAttach,
  openDefectModal, submitDefect, deleteDefect, refreshDefectPhotos, refreshDefectAttaches, addDefectAttach,
  openDesignAssetModal, submitDesignAsset, deleteDesignAsset, refreshAssetImages, refreshAssetAttaches, addAssetAttach,
  openEventModal, submitEvent, deleteEvent,
  openEntityModal, saveEntity, deleteEntity,
  openForwarderModal, saveForwarder, deleteForwarder,
  openBrokerModal, saveBroker, deleteBroker,
  openSupplierModal, submitSupplier, saveSupplier, deleteSupplier,
  addSupplierEvaluation, refreshSupEvals, refreshSupPhotos, refreshSupTags,
  exportJSON, resetDB, downloadProductTemplate,
});

Object.defineProperty(window, '_invDraft', { get: () => _invDraft, set: (v) => { _invDraft = v; } });
Object.defineProperty(window, '_sampleDraft', { get: () => _sampleDraft, set: (v) => { _sampleDraft = v; } });
Object.defineProperty(window, '_orderExtras', { get: () => _orderExtras, set: (v) => { _orderExtras = v; } });
Object.defineProperty(window, '_productImages', { get: () => _productImages, set: (v) => { _productImages = v; } });
Object.defineProperty(window, '_productAttaches', { get: () => _productAttaches, set: (v) => { _productAttaches = v; } });
Object.defineProperty(window, '_supDraft', { get: () => _supDraft, set: (v) => { _supDraft = v; } });
Object.defineProperty(window, '_defectDraft', { get: () => _defectDraft, set: (v) => { _defectDraft = v; } });
Object.defineProperty(window, '_assetDraft', { get: () => _assetDraft, set: (v) => { _assetDraft = v; } });

go('orders');
